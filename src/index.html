<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Stream Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --panel: #111;
      --border: #2a2a2a;
      --accent: #e8ff00;
      --accent2: #ff3c00;
      --text: #e0e0e0;
      --dim: #555;
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Bebas Neue', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px);
    }

    main {
      width: 100%;
      max-width: 480px;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 8vw, 4rem);
      letter-spacing: 0.08em;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(232,255,0,0.3), 3px 3px 0 var(--accent2);
      line-height: 1;
    }

    header p {
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    .player {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      padding: 2rem;
      position: relative;
    }

    /* VU meter */
    .vu-meter {
      display: flex;
      gap: 3px;
      height: 60px;
      align-items: flex-end;
      margin-bottom: 1.5rem;
      padding: 0.5rem;
      background: #000;
      border: 1px solid var(--border);
    }

    .vu-bar {
      flex: 1;
      background: var(--dim);
      min-height: 2px;
      transform-origin: bottom;
    }

    /* Status */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.playing {
      background: #1aff6a;
      box-shadow: 0 0 8px #1aff6a;
      animation: blink 1.2s ease-in-out infinite;
    }

    .status-dot.buffering {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: blink 0.4s ease-in-out infinite;
    }

    .status-dot.error {
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #status-text { color: var(--dim); }

    /* Stream URL display */
    .stream-url {
      font-size: 0.65rem;
      color: var(--dim);
      background: #000;
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      margin-bottom: 1.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.05em;
    }

    .stream-url span { color: var(--accent); }

    /* Controls */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    button {
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: 0.1em;
      padding: 0.8rem 1rem;
      border: 1px solid;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }

    button:active::after { opacity: 0.15; background: #fff; }

    #btn-play {
      border-color: var(--accent);
      color: var(--accent);
    }

    #btn-play:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 20px rgba(232,255,0,0.4);
    }

    #btn-stop {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    #btn-stop:hover {
      background: var(--accent2);
      color: #fff;
      box-shadow: 0 0 20px rgba(255,60,0,0.4);
    }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    button:disabled:hover {
      background: transparent;
      box-shadow: none;
      color: inherit;
    }

    #btn-record {
      border-color: #c0392b;
      color: #c0392b;
      grid-column: 1 / -1; /* full width row */
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 1.2rem;
    }

    #btn-record:hover:not(:disabled) {
      background: #c0392b;
      color: #fff;
      box-shadow: 0 0 20px rgba(192,57,43,0.5);
    }

    #btn-record.recording {
      border-color: var(--accent2);
      color: var(--accent2);
      animation: rec-pulse 1.4s ease-in-out infinite;
    }

    #btn-record.recording:hover:not(:disabled) {
      background: var(--accent2);
      color: #fff;
      box-shadow: 0 0 20px rgba(255,60,0,0.5);
    }

    @keyframes rec-pulse {
      0%, 100% { box-shadow: 0 0 0px rgba(255,60,0,0); }
      50%       { box-shadow: 0 0 12px rgba(255,60,0,0.7); }
    }

    .rec-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    #btn-record.recording .rec-dot {
      animation: blink 0.8s ease-in-out infinite;
    }

    .rec-timer {
      font-size: 0.75rem;
      font-family: var(--font-mono);
      letter-spacing: 0.1em;
      opacity: 0.8;
    }

    /* Volume control */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .volume-icon {
      font-size: 0.9rem;
      color: var(--dim);
      flex-shrink: 0;
      width: 1.2rem;
      text-align: center;
      user-select: none;
    }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 3px;
      background: var(--border);
      outline: none;
      cursor: pointer;
      position: relative;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px rgba(232,255,0,0.4);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .volume-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      box-shadow: 0 0 6px rgba(232,255,0,0.4);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .volume-slider:hover::-webkit-slider-thumb {
      transform: scale(1.3);
      box-shadow: 0 0 12px rgba(232,255,0,0.7);
    }

    .volume-slider:hover::-moz-range-thumb {
      transform: scale(1.3);
      box-shadow: 0 0 12px rgba(232,255,0,0.7);
    }

    .volume-value {
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 0.1em;
      width: 2.5rem;
      text-align: right;
      flex-shrink: 0;
    }

    /* No stream notice */
    .no-stream {
      text-align: center;
      padding: 1rem 0;
      font-size: 0.75rem;
      color: var(--dim);
      line-height: 1.8;
    }

    .no-stream code {
      color: var(--accent);
      background: #000;
      padding: 0.1em 0.4em;
    }

    /* ICY Station metadata panel */
    .station-meta {
      display: none;
      margin-bottom: 1.5rem;
      background: #000;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .station-meta.visible { display: flex; }

    .station-logo {
      width: 80px;
      min-width: 80px;
      height: 80px;
      object-fit: cover;
      display: block;
      background: #1a1a1a;
      border-right: 1px solid var(--border);
    }

    .station-logo-placeholder {
      width: 80px;
      min-width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      background: #0d0d0d;
      border-right: 1px solid var(--border);
      color: var(--dim);
      flex-shrink: 0;
    }

    .station-info {
      padding: 0.6rem 0.8rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.25rem;
      overflow: hidden;
      min-width: 0;
    }

    .station-name {
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.1;
    }

    .station-name a { color: inherit; text-decoration: none; }
    .station-name a:hover { text-decoration: underline; }

    .station-desc {
      font-size: 0.62rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.04em;
    }

    .station-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.15rem;
    }

    .station-tag {
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: #1a1a1a;
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 0.15em 0.45em;
    }

    .station-tag.hl {
      border-color: var(--accent);
      color: var(--accent);
    }

    footer {
      margin-top: 1rem;
      text-align: right;
      font-size: 0.6rem;
      color: #333;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Radio</h1>
      <p>Stream Player</p>
    </header>

    <article class="player">

      <!-- ICY station metadata — shown when headers are available -->
      <div class="station-meta" id="station-meta" aria-label="Station info"></div>

      <div class="vu-meter" id="vu-meter" aria-hidden="true">
      </div>

      <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Idle</span>
      </div>

      <div class="stream-url" id="stream-url-display">
        <span>SRC</span> —
      </div>

      <div id="player-content">
        <!-- controls or no-stream notice -->
      </div>

    </article>

    <footer>FM / AM / DAB / IP</footer>
  </main>

  <audio id="audio" preload="none"></audio>

  <script>
    /* =========================================================
       DOM REFS
    ========================================================= */
    const audio       = document.getElementById('audio');
    const vuMeter     = document.getElementById('vu-meter');
    const statusDot   = document.getElementById('status-dot');
    const statusText  = document.getElementById('status-text');
    const urlDisplay  = document.getElementById('stream-url-display');
    const content     = document.getElementById('player-content');
    const stationMeta = document.getElementById('station-meta');

    /* =========================================================
       STATUS UI
    ========================================================= */
    function setStatus(state, extra) {
      statusDot.className = 'status-dot ' + state;
      const labels = { idle: 'Idle', playing: 'On Air', buffering: 'Buffering…', error: 'Error' };
      statusText.textContent = extra || labels[state] || state;
    }

    /* =========================================================
       ICY METADATA MODULE
       Fetches ICY/Shoutcast stream headers via a HEAD request
       (requires the server to send CORS headers — same constraint
       as the Web Audio analyser). Renders station info into the
       #station-meta panel if any icy-* headers are present.
    ========================================================= */
    const IcyMeta = (() => {

      /** Try to read ICY headers from the stream URL. Returns parsed object or null. */
      async function fetch(url) {
        try {
          // Use no-cors as fallback awareness — but we actually need cors to read headers.
          // If the server doesn't allow CORS, headers will simply be empty.
          const res = await window.fetch(url, {
            method: 'GET',
            headers: { 'Icy-MetaData': '1' },
            // We only need the headers, but HEAD often isn't allowed for streams.
            // We abort immediately after headers arrive.
            signal: AbortSignal.timeout ? AbortSignal.timeout(5000) : undefined,
          });

          // Abort the body download right away — we only wanted headers
          res.body && res.body.cancel().catch(() => {});

          const h = res.headers;
          const get = key => h.get(key) || h.get(key.toLowerCase()) || null;

          const meta = {
            name:        get('icy-name'),
            description: get('icy-description'),
            genre:       get('icy-genre'),
            url:         get('icy-url'),
            logo:        get('icy-logo'),
            bitrate:     get('icy-br'),
            samplerate:  get('icy-sr'),
            mainUrl:     get('icy-main-stream-url'),
          };

          // Only return something if at least one useful field was found
          if (Object.values(meta).some(v => v !== null)) return meta;
          return null;

        } catch (e) {
          console.info('IcyMeta fetch failed (likely CORS or network):', e.message);
          return null;
        }
      }

      /** Render parsed metadata into the station panel. */
      function render(meta) {
        if (!meta) return;

        const nameHtml = meta.url
          ? `<a href="${meta.url}" target="_blank" rel="noopener">${esc(meta.name || 'Unknown Station')}</a>`
          : esc(meta.name || 'Unknown Station');

        // Genre tags — split on space or slash
        const genreTags = meta.genre
          ? meta.genre.split(/[\s/]+/).filter(Boolean).map(g =>
              `<span class="station-tag">${esc(g)}</span>`).join('')
          : '';

        // Technical tags
        const techTags = [
          meta.bitrate   ? `<span class="station-tag hl">${esc(meta.bitrate)} kbps</span>` : '',
          meta.samplerate ? `<span class="station-tag">${esc(meta.samplerate)} Hz</span>` : '',
        ].join('');

        const logoHtml = meta.logo
          ? `<img class="station-logo" src="${esc(meta.logo)}" alt="Station logo" onerror="this.outerHTML='<div class=station-logo-placeholder>📻</div>'">`
          : `<div class="station-logo-placeholder">📻</div>`;

        stationMeta.innerHTML = `
          ${logoHtml}
          <div class="station-info">
            <div class="station-name">${nameHtml}</div>
            ${meta.description ? `<div class="station-desc">${esc(meta.description)}</div>` : ''}
            ${(genreTags || techTags) ? `<div class="station-tags">${genreTags}${techTags}</div>` : ''}
          </div>`;

        stationMeta.classList.add('visible');
      }

      function esc(str) {
        return String(str)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;')
          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      /** Convenience: fetch then render. Call once after initiating playback. */
      async function load(url) {
        const meta = await fetch(url);
        render(meta);
      }

      function clear() {
        stationMeta.innerHTML = '';
        stationMeta.classList.remove('visible');
      }

      return { load, clear };
    })();

    /* =========================================================
       STREAM MODULE
       Responsible only for loading / playing / stopping audio.
       Strategy:
         1. Try with crossOrigin="anonymous" so Web Audio API can
            analyse the stream (works when the server sends CORS headers).
         2. If that causes a network error (server rejects CORS requests),
            retry without crossOrigin so audio still plays — but the
            analyser will only receive silence (browser security policy).
         3. After a short grace period we detect zero-output and tell
            the Visualizer to enter its CORS-fallback mode.
    ========================================================= */
    const StreamPlayer = (() => {
      let audioCtx   = null;
      let analyser   = null;
      let sourceNode = null;
      let corsMode   = true;   // start optimistic

      function ensureAudioGraph() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 64;               // 32 frequency bins
        analyser.smoothingTimeConstant = 0.8;
        sourceNode = audioCtx.createMediaElementSource(audio);
        sourceNode.connect(analyser);
        analyser.connect(audioCtx.destination);
      }

      /**
       * Load + play the given URL.
       * @param {string} url
       * @param {boolean} withCors  Whether to set crossOrigin="anonymous"
       * @returns {Promise}
       */
      function loadAndPlay(url, withCors) {
        ensureAudioGraph();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        if (withCors) {
          audio.crossOrigin = 'anonymous';
        } else {
          audio.removeAttribute('crossOrigin');
        }

        audio.src = url;
        audio.load();
        return audio.play();
      }

      function stop() {
        audio.pause();
        audio.src = '';
        audio.removeAttribute('crossOrigin');
        if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
      }

      function getAnalyser() { return analyser; }
      function getAudioContext() { return audioCtx; }
      function isCorsMode()  { return corsMode; }

      /**
       * High-level play: tries CORS first, falls back to no-CORS on error.
       * Returns a promise that resolves when audio starts playing,
       * and calls onCorsFailure() if we had to drop to no-CORS mode.
       */
      function play(url, onCorsFailure) {
        corsMode = true;

        return loadAndPlay(url, true).catch(err => {
          // Network/CORS error — retry without crossOrigin attribute
          console.warn('CORS play failed, retrying without crossOrigin:', err);
          corsMode = false;
          onCorsFailure();
          return loadAndPlay(url, false);
        });
      }

      return { play, stop, getAnalyser, getAudioContext, isCorsMode };
    })();

    /* =========================================================
       VISUALIZER MODULE
       Two rendering modes:
         • "analyser"  — real frequency data from Web Audio API
         • "fallback"  — simple CSS-driven idle animation when
                         CORS blocks analyser access
       To replace the visualization, edit renderAnalyserFrame()
       and/or renderFallbackFrame() independently.
    ========================================================= */
    const Visualizer = (() => {
      const BAR_COUNT = 16;
      const bars = [];
      let rafId     = null;
      let analyser  = null;
      let dataArray = null;
      let mode      = 'idle';  // 'idle' | 'analyser' | 'fallback'
      let fallbackT = 0;       // time counter for fallback animation

      // Build bar DOM elements once
      for (let i = 0; i < BAR_COUNT; i++) {
        const b = document.createElement('div');
        b.className = 'vu-bar';
        b.style.height = '2px';
        vuMeter.appendChild(b);
        bars.push(b);
      }

      /** Colour ramp: green → yellow → red */
      function barColor(norm) {
        if (norm < 0.6)  return '#1aff6a';
        if (norm < 0.85) return '#e8ff00';
        return '#ff3c00';
      }

      /* ---- Real analyser render ---- */
      function renderAnalyserFrame() {
        analyser.getByteFrequencyData(dataArray);
        const binCount = dataArray.length;
        const innerH   = vuMeter.clientHeight - 16;

        for (let i = 0; i < BAR_COUNT; i++) {
          const binIndex = Math.floor((i / BAR_COUNT) * binCount);
          const raw  = dataArray[binIndex];
          const norm = raw / 255;
          const px   = Math.max(2, Math.round(norm * innerH));
          bars[i].style.height     = px + 'px';
          bars[i].style.background = barColor(norm);
        }
      }

      /* ---- Fallback render (no analyser data) ---- */
      function renderFallbackFrame(ts) {
        // Gentle sine-wave ripple so bars aren't just static
        const innerH = vuMeter.clientHeight - 16;
        const t = ts / 1000;

        for (let i = 0; i < BAR_COUNT; i++) {
          // Each bar oscillates at a slightly different phase & frequency
          const phase = (i / BAR_COUNT) * Math.PI * 2;
          const speed = 0.6 + (i % 5) * 0.07;
          const norm  = 0.08 + 0.12 * (0.5 + 0.5 * Math.sin(t * speed + phase));
          const px    = Math.max(2, Math.round(norm * innerH));
          bars[i].style.height     = px + 'px';
          bars[i].style.background = '#1aff6a44'; // dim green tint
        }
      }

      /* ---- Shared RAF loop ---- */
      function loop(ts) {
        rafId = requestAnimationFrame(loop);
        if (mode === 'analyser') {
          renderAnalyserFrame();
        } else if (mode === 'fallback') {
          renderFallbackFrame(ts);
        }
      }

      /**
       * Check whether the analyser is actually producing data.
       * Returns true if all bins are zero (i.e. CORS blocked).
       */
      function isAnalyserSilent() {
        if (!analyser || !dataArray) return true;
        analyser.getByteFrequencyData(dataArray);
        return dataArray.every(v => v === 0);
      }

      function startLoop() {
        if (!rafId) rafId = requestAnimationFrame(loop);
      }

      function stopLoop() {
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      }

      /** Start with real analyser data. Call switchToFallback() if CORS blocks it. */
      function start(analyserNode) {
        analyser  = analyserNode;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        mode      = 'analyser';
        startLoop();
      }

      /** Switch to the fallback animation (called when CORS blocks the analyser). */
      function switchToFallback() {
        mode = 'fallback';
        startLoop();
      }

      function stop() {
        stopLoop();
        mode = 'idle';
        bars.forEach(b => {
          b.style.height     = '2px';
          b.style.background = 'var(--dim)';
        });
      }

      return { start, stop, switchToFallback, isAnalyserSilent };
    })();

    /* =========================================================
       MAIN — glue stream + visualizer together
    ========================================================= */
    const params    = new URLSearchParams(window.location.search);
    const streamUrl = params.get('play') || "https://dancewave.online/dance.ogg";

    if (streamUrl) {
      urlDisplay.innerHTML = `<span>SRC</span> ${streamUrl}`;
      urlDisplay.title = streamUrl;

      content.innerHTML = `
        <div class="controls">
          <button id="btn-play" aria-label="Play stream">▶ Play</button>
          <button id="btn-stop" aria-label="Stop stream" disabled>■ Stop</button>
          <button id="btn-record" aria-label="Record stream" disabled>
            <span class="rec-dot"></span>
            <span class="rec-label">Record</span>
            <span class="rec-timer"></span>
          </button>
        </div>
        <div class="volume-row">
          <span class="volume-icon" id="vol-icon">🔊</span>
          <input class="volume-slider" id="vol-slider" type="range" min="0" max="100" value="100" aria-label="Volume">
          <span class="volume-value" id="vol-value">100%</span>
        </div>
        <div id="cors-notice" style="
          display:none; margin-top:0.8rem; font-size:0.62rem;
          color:#555; letter-spacing:0.08em; line-height:1.6;
        ">⚠ Visualizer limited — stream server does not send CORS headers.</div>`;

      const btnPlay    = document.getElementById('btn-play');
      const btnStop    = document.getElementById('btn-stop');
      const btnRecord  = document.getElementById('btn-record');
      const corsNotice = document.getElementById('cors-notice');

      /* ---- Volume control ---- */
      const volSlider = document.getElementById('vol-slider');
      const volValue  = document.getElementById('vol-value');
      const volIcon   = document.getElementById('vol-icon');

      function updateVolumeUI(val) {
        const pct = Math.round(val * 100);
        volValue.textContent = `${pct}%`;
        // Track fill via background gradient
        volSlider.style.background =
          `linear-gradient(to right, var(--accent) ${pct}%, var(--border) ${pct}%)`;
        // Icon reflects level
        if (val === 0)       volIcon.textContent = '🔇';
        else if (val < 0.4)  volIcon.textContent = '🔈';
        else if (val < 0.75) volIcon.textContent = '🔉';
        else                 volIcon.textContent = '🔊';
      }

      volSlider.addEventListener('input', () => {
        const val = volSlider.value / 100;
        audio.volume = val;
        updateVolumeUI(val);
      });

      // Click the icon to toggle mute
      let lastVolume = 1;
      volIcon.style.cursor = 'pointer';
      volIcon.addEventListener('click', () => {
        if (audio.volume > 0) {
          lastVolume = audio.volume;
          audio.volume = 0;
          volSlider.value = 0;
        } else {
          audio.volume = lastVolume;
          volSlider.value = Math.round(lastVolume * 100);
        }
        updateVolumeUI(audio.volume);
      });

      // Init track fill
      updateVolumeUI(1);

      /* =========================================================
         RECORDER MODULE
         Records audio by collecting raw PCM samples via a
         ScriptProcessorNode tapped from the Web Audio graph.
         On stop, encodes collected samples as a proper WAV file
         and triggers a browser download. No external libs needed.
      ========================================================= */
      const Recorder = (() => {
        let processor   = null;   // ScriptProcessorNode
        let recording   = false;
        let buffers     = [];     // collected Float32Array chunks (L+R interleaved)
        let sampleRate  = 44100;
        let timerInterval = null;
        let startTime   = 0;

        const label = btnRecord.querySelector('.rec-label');
        const timer = btnRecord.querySelector('.rec-timer');

        function updateTimer() {
          const elapsed = Math.floor((Date.now() - startTime) / 1000);
          const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
          const s = String(elapsed % 60).padStart(2, '0');
          timer.textContent = `${m}:${s}`;
        }

        /**
         * Start recording from the existing AudioContext + AnalyserNode.
         * @param {AudioContext} ctx
         * @param {AudioNode} sourceNode  — the node to tap (analyser output)
         */
        function start(ctx, sourceNode) {
          if (recording) return;
          recording  = true;
          buffers    = [];
          sampleRate = ctx.sampleRate;

          // ScriptProcessorNode: 4096 sample buffer, 2ch in, 2ch out
          processor = ctx.createScriptProcessor(4096, 2, 2);

          processor.onaudioprocess = (e) => {
            if (!recording) return;
            const L = e.inputBuffer.getChannelData(0);
            const R = e.inputBuffer.getChannelData(1);
            // Interleave L/R into one chunk
            const interleaved = new Float32Array(L.length * 2);
            for (let i = 0; i < L.length; i++) {
              interleaved[i * 2]     = L[i];
              interleaved[i * 2 + 1] = R[i];
            }
            buffers.push(interleaved);
          };

          // Tap from sourceNode (analyser) → processor → ctx.destination
          // (processor must be connected to destination to fire in some browsers)
          sourceNode.connect(processor);
          processor.connect(ctx.destination);

          // UI
          btnRecord.classList.add('recording');
          label.textContent = 'Stop Rec';
          startTime = Date.now();
          updateTimer();
          timerInterval = setInterval(updateTimer, 1000);
        }

        function stop() {
          if (!recording) return;
          recording = false;

          clearInterval(timerInterval);
          timer.textContent = '';
          btnRecord.classList.remove('recording');
          label.textContent = 'Record';

          if (processor) {
            try { processor.disconnect(); } catch(_) {}
            processor.onaudioprocess = null;
            processor = null;
          }

          if (buffers.length === 0) return;

          // Merge all chunks
          const totalLen = buffers.reduce((s, b) => s + b.length, 0);
          const merged   = new Float32Array(totalLen);
          let offset = 0;
          for (const chunk of buffers) {
            merged.set(chunk, offset);
            offset += chunk.length;
          }
          buffers = [];

          downloadWav(merged, 2, sampleRate);
        }

        /**
         * Encode interleaved Float32 PCM as a 16-bit WAV and trigger download.
         */
        function downloadWav(samples, numChannels, rate) {
          const bytesPerSample = 2;  // 16-bit
          const blockAlign     = numChannels * bytesPerSample;
          const byteRate       = rate * blockAlign;
          const dataLen        = samples.length * bytesPerSample;
          const buffer         = new ArrayBuffer(44 + dataLen);
          const view           = new DataView(buffer);

          // WAV header
          const writeStr = (off, str) => {
            for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i));
          };
          writeStr(0,  'RIFF');
          view.setUint32(4,  36 + dataLen, true);
          writeStr(8,  'WAVE');
          writeStr(12, 'fmt ');
          view.setUint32(16, 16, true);            // PCM chunk size
          view.setUint16(20, 1,  true);            // PCM format
          view.setUint16(22, numChannels, true);
          view.setUint32(24, rate, true);
          view.setUint32(28, byteRate, true);
          view.setUint16(32, blockAlign, true);
          view.setUint16(34, 16, true);            // bits per sample
          writeStr(36, 'data');
          view.setUint32(40, dataLen, true);

          // PCM samples — clamp float32 → int16
          let p = 44;
          for (let i = 0; i < samples.length; i++, p += 2) {
            const s = Math.max(-1, Math.min(1, samples[i]));
            view.setInt16(p, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
          }

          // Generate filename: station-name or timestamp
          const stationEl = document.querySelector('.station-name');
          const base = stationEl
            ? stationEl.textContent.trim().replace(/[^a-z0-9]/gi, '_').toLowerCase()
            : 'recording';
          const ts = new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-');
          const filename = `${base}_${ts}.wav`;

          const blob = new Blob([buffer], { type: 'audio/wav' });
          const url  = URL.createObjectURL(blob);
          const a    = document.createElement('a');
          a.href     = url;
          a.download = filename;
          a.click();
          setTimeout(() => URL.revokeObjectURL(url), 10000);
        }

        function isRecording() { return recording; }

        return { start, stop, isRecording };
      })();

      /* ---- Wire record button ---- */
      btnRecord.addEventListener('click', () => {
        if (Recorder.isRecording()) {
          Recorder.stop();
        } else {
          const ctx       = StreamPlayer.getAudioContext();
          const tapNode   = StreamPlayer.getAnalyser();
          if (ctx && tapNode) Recorder.start(ctx, tapNode);
        }
      });

      // After audio starts playing, wait briefly then check if
      // the analyser is actually receiving data.
      let corsCheckTimer = null;
      function scheduleCorsCheck() {
        clearTimeout(corsCheckTimer);
        corsCheckTimer = setTimeout(() => {
          if (Visualizer.isAnalyserSilent()) {
            console.warn('Analyser output is silent — CORS likely blocked. Switching to fallback visualizer.');
            Visualizer.switchToFallback();
            corsNotice.style.display = 'block';
          }
        }, 2500); // give the stream 2.5 s to start producing data
      }

      function handlePlay() {
        btnPlay.disabled = true;
        btnStop.disabled = false;
        corsNotice.style.display = 'none';
        setStatus('buffering');

        // Fetch ICY headers in parallel with starting playback
        IcyMeta.load(streamUrl);

        StreamPlayer.play(
          streamUrl,
          /* onCorsFailure — called synchronously if CORS request errored */ () => {
            Visualizer.switchToFallback();
            corsNotice.style.display = 'block';
          }
        ).catch(() => {
          setStatus('error');
          Visualizer.stop();
          btnPlay.disabled = false;
          btnStop.disabled = true;
        });
      }

      function handleStop() {
        clearTimeout(corsCheckTimer);
        if (Recorder.isRecording()) Recorder.stop();
        StreamPlayer.stop();
        Visualizer.stop();
        IcyMeta.clear();
        btnPlay.disabled = false;
        btnStop.disabled = true;
        btnRecord.disabled = true;
        setStatus('idle');
      }

      btnPlay.addEventListener('click', handlePlay);
      btnStop.addEventListener('click', handleStop);

      audio.addEventListener('playing', () => {
        setStatus('playing');
        Visualizer.start(StreamPlayer.getAnalyser());
        scheduleCorsCheck();   // verify analyser is producing real data
        btnRecord.disabled = false;
      });

      audio.addEventListener('waiting', () => { setStatus('buffering'); });
      audio.addEventListener('stalled', () => { setStatus('buffering'); });
      audio.addEventListener('ended',   handleStop);

      audio.addEventListener('error', () => {
        setStatus('error');
        Visualizer.stop();
        if (Recorder.isRecording()) Recorder.stop();
        btnPlay.disabled = false;
        btnStop.disabled = true;
        btnRecord.disabled = true;
      });

      // Auto-play on load
      handlePlay();

    } else {
      content.innerHTML = `
        <div class="no-stream">
          <p>No stream URL provided.</p>
          <p>Add <code>?play=https://…</code> to the URL.</p>
        </div>`;
      setStatus('idle');
    }
  </script>
</body>
</html>
