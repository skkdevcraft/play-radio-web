<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Stream Player</title>
  <style id="theme-font-style"></style>
  <style id="theme-custom-css">/* custom skin CSS injected here */</style>
  <style>
    /* ============================================================
       BASE RESET
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ============================================================
       THEME CSS CUSTOM PROPERTIES
       ThemeEngine writes these at runtime from the active theme.
       All component styles reference ONLY these tokens.

       MODDERS: Every --var below can be overridden in your skin's
       "vars" object. See the downloadable skin JSON for full docs.
    ============================================================ */
    :root {
      /* ── Colors ─────────────────────────────────────────── */
      --color-bg:               #0a0a0a;
      --color-panel:            #111111;
      --color-panel-alt:        #0d0d0d;
      --color-well:             #000000;
      --color-border:           #2a2a2a;
      --color-border-subtle:    #161616;
      --color-accent:           #e8ff00;
      --color-accent-shadow:    rgba(232,255,0,0.3);
      --color-accent2:          #ff3c00;
      --color-accent2-shadow:   rgba(255,60,0,0.4);
      --color-status-playing:   #1aff6a;
      --color-status-buffering: #e8ff00;
      --color-status-error:     #ff3c00;
      --color-vu-low:           #1aff6a;
      --color-vu-mid:           #e8ff00;
      --color-vu-high:          #ff3c00;
      --color-vu-idle:          #555555;
      --color-text:             #e0e0e0;
      --color-text-dim:         #555555;
      --color-text-muted:       #333333;
      --color-record:           #c0392b;
      --color-record-shadow:    rgba(192,57,43,0.5);

      /* ── Typography ──────────────────────────────────────── */
      --font-mono:              'Share Tech Mono', monospace;
      --font-display:           'Bebas Neue', sans-serif;

      /* ── Header ──────────────────────────────────────────── */
      --header-display:         block;       /* none = hide entire header */
      --header-title-text:      none;        /* CSS content override for title (set to '"MY RADIO"' with quotes-in-quotes) */
      --header-subtitle-text:   none;        /* CSS content override for subtitle */
      --header-title-color:     #e8ff00;
      --header-title-size:      clamp(2.5rem, 8vw, 4rem);
      --header-title-shadow:    0 0 20px rgba(232,255,0,0.3), 3px 3px 0 #ff3c00;
      --header-subtitle-color:  #555555;
      --header-align:           center;      /* text-align: left | center | right */

      /* ── Layout grid ─────────────────────────────────────── */
      /*
        The main #app container uses CSS Grid.
        Default: single column, stacked vertically.

        To go 2-column (player left, favorites right) set:
          --layout-columns: 1fr 1fr
        Then assign grid areas with --ELEMENT-grid-area vars below.

        Named areas used by default layout (single col):
          "header"    = .site-header
          "player"    = .player  (article)
          "themes"    = .theme-switcher
          "favorites" = .favorites-panel

        Example 2-col layout value for --layout-areas:
          '"header header" "player favorites" "themes themes"'
          (each row is a quoted string, columns separated by spaces)
      */
      --layout-columns:         1fr;
      --layout-rows:            auto;
      --layout-areas:
        "header"
        "player"
        "themes"
        "favorites";
      --layout-gap:             0px;        /* gap between grid cells */
      --layout-max-width:       520px;
      --layout-padding:         2rem;
      --layout-align-items:     start;

      /* ── Element grid placement ──────────────────────────── */
      /*
        Override these to place elements in specific grid areas.
        Values are CSS grid-area strings (named area or row/col shorthand).
        Example: --header-grid-area: header
                 --favorites-grid-area: 2 / 2 / 3 / 3
      */
      --header-grid-area:       header;
      --player-grid-area:       player;
      --themes-grid-area:       themes;
      --favorites-grid-area:    favorites;

      /* ── Element visibility ──────────────────────────────── */
      --player-display:         block;       /* none = hide player panel */
      --status-bar-display:     flex;        /* none = hide status bar */
      --stream-url-display:     block;       /* none = hide source URL bar */
      --vu-meter-display:       flex;        /* none = hide VU meter */
      --station-meta-display:   flex;        /* shown by JS when playing; override only if you want forced-off */
      --record-btn-display:     grid-column; /* record btn: "none" hides it; default inherits grid */
      --volume-display:         flex;        /* none = hide volume control */
      --cors-notice-display:    none;        /* keep none unless debugging */
      --theme-switcher-display: block;       /* none = hide skin picker */
      --favorites-display:      block;       /* none = hide favorites panel */
      --footer-display:         block;       /* none = hide footer */

      /* ── Panel ────────────────────────────────────────────── */
      --panel-bg:               #111111;
      --panel-border:           #2a2a2a;
      --panel-border-top:       3px solid #e8ff00;
      --panel-border-right:     1px solid #2a2a2a;
      --panel-border-bottom:    1px solid #2a2a2a;
      --panel-border-left:      1px solid #2a2a2a;
      --panel-padding:          2rem;
      --panel-border-radius:    0px;

      /* ── Background ──────────────────────────────────────── */
      --bg-color:               #0a0a0a;
      --bg-image:               none;        /* url(...) or none */
      --bg-size:                auto;
      --bg-position:            center;
      --bg-repeat:              repeat;
      --bg-attachment:          scroll;
      --bg-blend-mode:          normal;
      --bg-grid-color:          #1a1a1a;
      --bg-grid-size:           40px;
      --bg-grid-display:        block;       /* none = disable grid lines */

      /* ── Buttons ─────────────────────────────────────────── */
      --btn-play-border:        #e8ff00;
      --btn-play-color:         #e8ff00;
      --btn-play-hover-bg:      #e8ff00;
      --btn-play-hover-color:   #000000;
      --btn-play-hover-shadow:  0 0 20px rgba(232,255,0,0.4);
      --btn-stop-border:        #ff3c00;
      --btn-stop-color:         #ff3c00;
      --btn-stop-hover-bg:      #ff3c00;
      --btn-stop-hover-color:   #ffffff;
      --btn-stop-hover-shadow:  0 0 20px rgba(255,60,0,0.4);
      --btn-font-size:          1.4rem;
      --btn-padding:            0.8rem 1rem;
      --btn-border-width:       1px;
      --btn-border-style:       solid;
      --btn-border-radius:      0px;
      --btn-text-transform:     none;        /* uppercase | none */
      --btn-letter-spacing:     0.1em;

      /* ── Slider ──────────────────────────────────────────── */
      --slider-height:          3px;
      --slider-thumb-size:      14px;
      --slider-thumb-color:     #e8ff00;
      --slider-thumb-shadow:    0 0 6px rgba(232,255,0,0.4);
      --slider-track-bg:        #2a2a2a;

      /* ── VU Meter ─────────────────────────────────────────── */
      --vu-height:              60px;
      --vu-gap:                 3px;
      --vu-bar-radius:          0px;         /* rounded bars: try 4px */

      /* ── Station Meta ─────────────────────────────────────── */
      --meta-logo-size:         80px;
      --meta-name-color:        #e8ff00;
      --meta-tag-color:         #555555;
      --meta-tag-border:        #2a2a2a;
      --meta-tag-hl-color:      #e8ff00;
      --meta-tag-hl-border:     rgba(232,255,0,0.3);

      /* ── Favorites Panel ──────────────────────────────────── */
      --fav-panel-border-top:   3px solid #333333;
      --fav-item-active-bg:     #0d1400;
      --fav-item-active-accent: #e8ff00;
      --fav-item-hover-bg:      #111111;
      --fav-logo-size:          52px;
      --fav-name-color:         #e0e0e0;
      --fav-name-active-color:  #e8ff00;
      --fav-btn-play-color:     #e8ff00;
      --fav-btn-rem-color:      #ff3c00;
      --fav-max-height:         320px;       /* max height of station list */

      /* ── Toast ───────────────────────────────────────────── */
      --toast-bg:               #1a1a1a;
      --toast-border:           #2a2a2a;
      --toast-accent-border:    #e8ff00;
      --toast-error-border:     #ff3c00;
      --toast-color:            #e0e0e0;
      --toast-position-bottom:  1.5rem;
    }

    /* ============================================================
       BODY & BACKGROUND
       --bg-image accepts any CSS image value: url(), gradients, etc.
       --bg-grid-display: none disables the grid overlay entirely.
    ============================================================ */
    body {
      background-color: var(--bg-color);
      background-image: var(--bg-image, none);
      background-size: var(--bg-size);
      background-position: var(--bg-position);
      background-repeat: var(--bg-repeat);
      background-attachment: var(--bg-attachment);
      background-blend-mode: var(--bg-blend-mode);
      color: var(--color-text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--layout-padding);
    }

    /* Grid overlay — pseudo-element so it never blocks bg-image */
    body::before {
      content: '';
      display: var(--bg-grid-display);
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent calc(var(--bg-grid-size) - 1px),
          var(--bg-grid-color) calc(var(--bg-grid-size) - 1px), var(--bg-grid-color) var(--bg-grid-size)),
        repeating-linear-gradient(90deg, transparent, transparent calc(var(--bg-grid-size) - 1px),
          var(--bg-grid-color) calc(var(--bg-grid-size) - 1px), var(--bg-grid-color) var(--bg-grid-size));
    }

    /* ============================================================
       MAIN GRID CONTAINER
       This is the primary layout engine. Control it entirely with
       CSS vars — no HTML changes needed.

       Quick recipes (put in customCSS or vars):

       ┌─────────────────────────────────────────────────────┐
       │ Side-by-side (player left, favorites right):        │
       │   --layout-columns: 1fr 1fr;                        │
       │   --layout-areas:                                   │
       │     '"header header"'                               │
       │     '"player favorites"'                            │
       │     '"themes themes"';                              │
       │   --layout-max-width: 1040px;                       │
       ├─────────────────────────────────────────────────────┤
       │ Favorites on top:                                   │
       │   --favorites-grid-area: 1 / 1 / 2 / 2;            │
       │   (or swap areas in --layout-areas)                 │
       ├─────────────────────────────────────────────────────┤
       │ No skin picker:                                     │
       │   --theme-switcher-display: none;                   │
       ├─────────────────────────────────────────────────────┤
       │ Compact / no header:                                │
       │   --header-display: none;                           │
       └─────────────────────────────────────────────────────┘
    ============================================================ */
    main#app {
      display: grid;
      grid-template-columns: var(--layout-columns);
      grid-template-rows:    var(--layout-rows);
      grid-template-areas:   var(--layout-areas);
      gap:                   var(--layout-gap);
      align-items:           var(--layout-align-items);
      width: 100%;
      max-width: var(--layout-max-width);
      padding-top: 1rem;
      position: relative;
      z-index: 1;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .site-header {
      grid-area: var(--header-grid-area);
      display: var(--header-display);
      text-align: var(--header-align);
      margin-bottom: 2.5rem;
    }

    /*
      Title text override — to replace "Radio" with custom text:
        In vars: "header-title-text": '"MY STATION"'  (the value needs CSS quotes)
        The real text is hidden via font-size:0 and the ::after injects yours.
        If --header-title-text is "none" (default) the real text shows normally.
    */
    .site-header__title {
      font-family: var(--font-display);
      font-size: var(--header-title-size);
      letter-spacing: 0.08em;
      color: var(--header-title-color);
      text-shadow: var(--header-title-shadow);
      line-height: 1;
    }
    .site-header__title[data-override]::before {
      content: var(--header-title-text);
    }
    .site-header__title[data-override] {
      font-size: 0;
      color: transparent;
      text-shadow: none;
    }
    .site-header__title[data-override]::before {
      font-size: var(--header-title-size);
      color: var(--header-title-color);
      text-shadow: var(--header-title-shadow);
      display: block;
    }

    .site-header__subtitle {
      font-size: 0.7rem;
      color: var(--header-subtitle-color);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }
    .site-header__subtitle[data-override] {
      font-size: 0;
    }
    .site-header__subtitle[data-override]::before {
      content: var(--header-subtitle-text);
      font-size: 0.7rem;
      display: block;
    }

    /* ── Player panel ───────────────────────────────────────── */
    .player {
      grid-area: var(--player-grid-area);
      display: var(--player-display);
      background: var(--panel-bg);
      border-top:    var(--panel-border-top);
      border-right:  var(--panel-border-right);
      border-bottom: var(--panel-border-bottom);
      border-left:   var(--panel-border-left);
      border-radius: var(--panel-border-radius);
      padding: var(--panel-padding);
      position: relative;
    }

    /* ── Station meta ─────────────────────────────────────────── */
    .station-meta {
      display: none;
      margin-bottom: 1.5rem;
      background: var(--color-well);
      border: 1px solid var(--color-border);
      overflow: hidden;
    }
    .station-meta.is-visible { display: var(--station-meta-display, flex); }
    .station-meta__logo { width: var(--meta-logo-size); min-width: var(--meta-logo-size); height: var(--meta-logo-size); object-fit: cover; display: block; background: #1a1a1a; border-right: 1px solid var(--color-border); }
    .station-meta__logo-placeholder { width: var(--meta-logo-size); min-width: var(--meta-logo-size); height: var(--meta-logo-size); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; background: var(--color-panel-alt); border-right: 1px solid var(--color-border); color: var(--color-text-dim); flex-shrink: 0; }
    .station-meta__info { padding: 0.6rem 0.8rem; display: flex; flex-direction: column; justify-content: center; gap: 0.25rem; overflow: hidden; min-width: 0; }
    .station-meta__name { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 0.08em; color: var(--meta-name-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.1; }
    .station-meta__name a { color: inherit; text-decoration: none; }
    .station-meta__name a:hover { text-decoration: underline; }
    .station-meta__desc { font-size: 0.62rem; color: var(--color-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.04em; }
    .station-meta__tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.15rem; }
    .station-meta__tag { font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; background: #1a1a1a; border: 1px solid var(--meta-tag-border); color: var(--meta-tag-color); padding: 0.15em 0.45em; }
    .station-meta__tag--hl { border-color: var(--meta-tag-hl-border); color: var(--meta-tag-hl-color); }

    /* ── VU Meter ───────────────────────────────────────────── */
    .vu-meter {
      display: var(--vu-meter-display);
      gap: var(--vu-gap);
      height: var(--vu-height);
      align-items: flex-end;
      margin-bottom: 1.5rem;
      padding: 0.5rem;
      background: var(--color-well);
      border: 1px solid var(--color-border);
    }
    .vu-meter__bar {
      flex: 1;
      background: var(--color-vu-idle);
      min-height: 2px;
      transform-origin: bottom;
      border-radius: var(--vu-bar-radius);
    }

    /* ── Status bar ─────────────────────────────────────────── */
    .status-bar {
      display: var(--status-bar-display);
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .status-bar__dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-text-dim); flex-shrink: 0; transition: background 0.3s; }
    .status-bar__dot--playing  { background: var(--color-status-playing);  box-shadow: 0 0 8px var(--color-status-playing);  animation: blink 1.2s ease-in-out infinite; }
    .status-bar__dot--buffering{ background: var(--color-status-buffering); box-shadow: 0 0 8px var(--color-status-buffering); animation: blink 0.4s ease-in-out infinite; }
    .status-bar__dot--error    { background: var(--color-status-error);     box-shadow: 0 0 8px var(--color-status-error); }
    .status-bar__text { color: var(--color-text-dim); }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── Stream URL ─────────────────────────────────────────── */
    .stream-url {
      display: var(--stream-url-display);
      font-size: 0.65rem;
      color: var(--color-text-dim);
      background: var(--color-well);
      border: 1px solid var(--color-border);
      padding: 0.5rem 0.75rem;
      margin-bottom: 1.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.05em;
    }
    .stream-url__label { color: var(--color-accent); }

    /* ── Controls ───────────────────────────────────────────── */
    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .btn {
      font-family: var(--font-display);
      font-size: var(--btn-font-size);
      letter-spacing: var(--btn-letter-spacing);
      text-transform: var(--btn-text-transform);
      padding: var(--btn-padding);
      border: var(--btn-border-width) var(--btn-border-style);
      border-radius: var(--btn-border-radius);
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      position: relative;
      overflow: hidden;
    }
    .btn::after { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.15s; }
    .btn:active::after { opacity: 0.15; background: #fff; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn:disabled:hover { background: transparent !important; box-shadow: none !important; color: inherit !important; }
    .btn--play { border-color: var(--btn-play-border); color: var(--btn-play-color); }
    .btn--play:hover:not(:disabled) { background: var(--btn-play-hover-bg); color: var(--btn-play-hover-color); box-shadow: var(--btn-play-hover-shadow); }
    .btn--stop { border-color: var(--btn-stop-border); color: var(--btn-stop-color); }
    .btn--stop:hover:not(:disabled) { background: var(--btn-stop-hover-bg); color: var(--btn-stop-hover-color); box-shadow: var(--btn-stop-hover-shadow); }
    .btn--record {
      border-color: var(--color-record);
      color: var(--color-record);
      grid-column: 1/-1;
      display: var(--record-btn-display, flex);
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 1.2rem;
    }
    .btn--record:hover:not(:disabled) { background: var(--color-record); color: #fff; box-shadow: 0 0 20px var(--color-record-shadow); }
    .btn--record.is-recording { border-color: var(--color-accent2); color: var(--color-accent2); animation: rec-pulse 1.4s ease-in-out infinite; }
    .btn--record.is-recording:hover:not(:disabled) { background: var(--color-accent2); color: #fff; box-shadow: 0 0 20px var(--color-accent2-shadow); }
    @keyframes rec-pulse { 0%,100%{box-shadow:0 0 0px rgba(255,60,0,0);} 50%{box-shadow:0 0 12px rgba(255,60,0,0.7);} }
    .btn--record__dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .btn--record.is-recording .btn--record__dot { animation: blink 0.8s ease-in-out infinite; }
    .btn--record__timer { font-size: 0.75rem; font-family: var(--font-mono); letter-spacing: 0.1em; opacity: 0.8; }

    /* ── Volume ─────────────────────────────────────────────── */
    .volume-control {
      display: var(--volume-display);
      align-items: center;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .volume-control__icon { font-size: 0.9rem; color: var(--color-text-dim); flex-shrink: 0; width: 1.2rem; text-align: center; cursor: pointer; user-select: none; }
    .volume-control__slider { -webkit-appearance: none; appearance: none; flex: 1; height: var(--slider-height); background: var(--slider-track-bg); outline: none; cursor: pointer; }
    .volume-control__slider::-webkit-slider-thumb { -webkit-appearance: none; width: var(--slider-thumb-size); height: var(--slider-thumb-size); border-radius: 50%; background: var(--slider-thumb-color); box-shadow: var(--slider-thumb-shadow); cursor: pointer; transition: transform 0.1s; }
    .volume-control__slider::-moz-range-thumb { width: var(--slider-thumb-size); height: var(--slider-thumb-size); border-radius: 50%; border: none; background: var(--slider-thumb-color); box-shadow: var(--slider-thumb-shadow); cursor: pointer; }
    .volume-control__slider:hover::-webkit-slider-thumb { transform: scale(1.3); }
    .volume-control__value { font-size: 0.65rem; color: var(--color-text-dim); letter-spacing: 0.1em; width: 2.5rem; text-align: right; flex-shrink: 0; }
    .cors-notice { display: none; margin-top: 0.8rem; font-size: 0.62rem; color: var(--color-text-muted); letter-spacing: 0.08em; line-height: 1.6; }

    /* ── Theme switcher ─────────────────────────────────────── */
    .theme-switcher {
      grid-area: var(--themes-grid-area);
      display: var(--theme-switcher-display);
      margin-top: 1.5rem;
      border: 1px solid var(--color-border);
      border-top: 3px solid var(--color-accent2);
    }
    .theme-switcher__header { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1rem; background: var(--color-panel-alt); border-bottom: 1px solid var(--color-border); cursor: pointer; user-select: none; }
    .theme-switcher__title { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 0.12em; color: var(--color-text); }
    .theme-switcher__toggle { font-size: 0.7rem; color: var(--color-text-dim); transition: transform 0.2s; }
    .theme-switcher__toggle.is-open { transform: rotate(180deg); }
    .theme-switcher__body { display: none; background: var(--color-bg); }
    .theme-switcher__body.is-open { display: block; }
    .theme-switcher__actions { display: flex; gap: 0.5rem; padding: 0.75rem 1rem; border-bottom: 1px solid var(--color-border); flex-wrap: wrap; }
    .theme-switcher__upload-label,
    .theme-switcher__download-btn { font-family: var(--font-display); font-size: 0.9rem; letter-spacing: 0.1em; padding: 0.4rem 0.9rem; border: 1px solid var(--color-border); color: var(--color-text-dim); cursor: pointer; background: transparent; transition: all 0.15s; white-space: nowrap; display: inline-flex; align-items: center; gap: 0.3rem; }
    .theme-switcher__upload-label:hover,

<body>
  <main id="app">

    <header class="site-header">
      <h1 class="site-header__title">Radio</h1>
      <p class="site-header__subtitle">Stream Player</p>
    </header>

    <article class="player" aria-label="Stream player">
      <section class="station-meta" id="station-meta" aria-label="Station info" aria-live="polite"></section>

      <div class="status-bar" role="status" aria-live="polite">
        <span class="status-bar__dot" id="status-dot" aria-hidden="true"></span>
        <span class="status-bar__text" id="status-text">Idle</span>
      </div>
      <div class="stream-url" id="stream-url-display" aria-label="Stream source">
        <span class="stream-url__label">SRC</span> —
      </div>
      <div class="controls" role="group" aria-label="Playback controls">
        <button class="btn btn--play" id="btn-play" aria-label="Play stream">▶ Play</button>
        <button class="btn btn--stop" id="btn-stop" aria-label="Stop stream" disabled>■ Stop</button>
        <button class="btn btn--record" id="btn-record" aria-label="Record stream" disabled>
          <span class="btn--record__dot" aria-hidden="true"></span>
          <span class="btn--record__label">Record</span>
          <span class="btn--record__timer"></span>
        </button>
      </div>
      <div class="volume-control">
        <span class="volume-control__icon" id="vol-icon" role="button" tabindex="0" aria-label="Toggle mute">🔊</span>
        <input class="volume-control__slider" id="vol-slider" type="range" min="0" max="100" value="100" aria-label="Volume">
        <span class="volume-control__value" id="vol-value">100%</span>
      </div>
      <p class="cors-notice" id="cors-notice" role="alert">
        ⚠ Visualizer limited — stream server does not send CORS headers.
      </p>
    </article>

    <!-- THEME / SKIN SWITCHER -->
    <aside class="theme-switcher" id="theme-switcher" aria-label="Appearance / Skin">
      <div class="theme-switcher__header" id="theme-header" role="button" tabindex="0">

        <span class="theme-switcher__toggle" id="theme-toggle">▼</span>
      </div>
      <div class="theme-switcher__body" id="theme-body">
        <div class="theme-switcher__actions">
          <label class="theme-switcher__upload-label" tabindex="0" role="button" title="Upload a .json theme file">
            ⬆ Upload Skin
            <input class="theme-switcher__upload-input" id="theme-upload" type="file" accept=".json,application/json">
          </label>
          <button class="theme-switcher__download-btn" id="theme-download-btn" title="Download current skin as .json with instructions">
            ⬇ Download Skin
          </button>
        </div>
        <div class="theme-grid" id="theme-grid" role="listbox" aria-label="Available skins"></div>
      </div>
    </aside>

    <!-- FAVORITES -->
    <section class="favorites-panel" id="favorites-panel" aria-label="Favorite stations">
      <div class="favorites-panel__header" id="fav-header" role="button" tabindex="0">
        <div style="display:flex;align-items:center;gap:0.6rem;">
          <span class="favorites-panel__title">Favorites</span>
          <span class="favorites-panel__count" id="fav-count">0</span>
        </div>
        <span class="favorites-panel__toggle is-open" id="fav-toggle">▼</span>
      </div>
      <div class="favorites-panel__body is-open" id="fav-body">
        <div class="add-station">
          <input class="add-station__input" id="fav-input" type="url"

                 autocomplete="off" spellcheck="false" aria-label="Stream URL to add" />
          <button class="add-station__btn" id="fav-add-btn">+ Add</button>
        </div>
        <div class="station-list" id="station-list" role="list"></div>
      </div>
    </section>

  </main>

  <footer class="site-footer">FM / AM / DAB / IP</footer>
  <div class="toast" id="toast" role="status" aria-live="assertive" aria-atomic="true"></div>
  <audio id="audio" preload="none"></audio>

      const existing = _fontStyle.textContent || '';
      const imports = toLoad.map(n => `@import url('https://fonts.googleapis.com/css2?family=${n}&display=swap');`).join('\n');
      _fontStyle.textContent = existing + '\n' + imports;
      toLoad.forEach(n => _loadedFonts.add(n));
    }
    const root = document.documentElement;
    if (mono)    root.style.setProperty('--font-mono',    `'${mono.family}', ${mono.fallback}`);
    if (display) root.style.setProperty('--font-display', `'${display.family}', ${display.fallback}`);

    if (titleEl) {
      if (titleText && titleText !== 'none') titleEl.setAttribute('data-override', '');
      else titleEl.removeAttribute('data-override');

========================================================= */
const Toast = (() => {
  let timer = null;
  const el = document.getElementById('toast');
  function show(msg, isError = false) {
    if (!el) return;
    el.textContent = msg;
    el.className = 'toast is-visible' + (isError ? ' is-error' : '');
    clearTimeout(timer);
    timer = setTimeout(() => { if (el) el.className = 'toast'; }, 2500);
  }
  return { show };
})();

const StatusBar = (() => {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  const LABELS = { idle: 'Idle', playing: 'On Air', buffering: 'Buffering…', error: 'Error' };
  function set(state, extra) {
    if (dot)  dot.className = 'status-bar__dot' + (state !== 'idle' ? ` status-bar__dot--${state}` : '');
    if (text) text.textContent = extra || LABELS[state] || state;
  }
  return { set };
})();

   FAVORITES STORE
========================================================= */
const FavoritesStore = (() => {
  const KEY = 'radio_favorites_v1';
  const DEFAULTS = [
    'https://dancewave.online/dance.ogg',
    'https://n08.radiojar.com/083wqknmsuhvv?rj-ttl=5&rj-tok=AAABnIWtQmMAztJzDQnM9GXL5A',
    'https://play.global.audio/nrj128',
    'https://play.global.audio/vanillahi.aac',
    'https://play.global.audio/energy-90s.aac',
  ];
  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw !== null) return JSON.parse(raw) || [];
      const defaults = DEFAULTS.map(url => ({ url, meta: null, addedAt: Date.now() }));
      localStorage.setItem(KEY, JSON.stringify(defaults));
      return defaults;
    } catch { return []; }
  }
  function save(list) { try { localStorage.setItem(KEY, JSON.stringify(list)); } catch (_) {} }
  function getAll() { return load(); }
  function add(url) {
    const list = load();
    if (list.find(f => f.url === url)) return false;
    list.push({ url, meta: null, addedAt: Date.now() });
    save(list); return true;
  }
  function remove(url) { save(load().filter(f => f.url !== url)); }
  function updateMeta(url, meta) {
    const list = load();
    const item = list.find(f => f.url === url);
    if (item) { item.meta = meta; save(list); }
  }
  return { getAll, add, remove, updateMeta };
})();

  const panelEl = document.getElementById('station-meta');

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function fetchMeta(url) {
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 6000);
      const res = await fetch(url, { method: 'GET', redirect: 'follow', signal: ctrl.signal });
      clearTimeout(tid);
      try { if (res.body) await res.body.cancel(); } catch (_) {}
      const h = res.headers;
      const get = k => h.get(k) || h.get(k.toLowerCase()) || null;
      const meta = {
        name: get('icy-name'), description: get('icy-description'), genre: get('icy-genre'),
        url: get('icy-url'), logo: get('icy-logo'), bitrate: get('icy-br'), samplerate: get('icy-sr'),
      };
      return Object.values(meta).some(v => v !== null) ? meta : null;
    } catch { return null; }
  }

  function renderPanel(meta) {
    if (!panelEl || !meta) return;
    const nameHtml = meta.url
      ? `<a href="${esc(meta.url)}" target="_blank" rel="noopener">${esc(meta.name || 'Unknown Station')}</a>`
      : esc(meta.name || 'Unknown Station');
    const genreTags = meta.genre
      ? meta.genre.split(/[\s/]+/).filter(Boolean).map(g => `<span class="station-meta__tag">${esc(g)}</span>`).join('')
      : '';
    const techTags = [
      meta.bitrate    ? `<span class="station-meta__tag station-meta__tag--hl">${esc(meta.bitrate)} kbps</span>` : '',
      meta.samplerate ? `<span class="station-meta__tag">${esc(meta.samplerate)} Hz</span>` : '',
    ].join('');
    const logoHtml = meta.logo
      ? `<img class="station-meta__logo" src="${esc(meta.logo)}" alt="" onerror="this.outerHTML='<div class=station-meta__logo-placeholder>📻</div>'">`
      : `<div class="station-meta__logo-placeholder">📻</div>`;
    panelEl.innerHTML = `
      ${logoHtml}
      <div class="station-meta__info">
        <div class="station-meta__name">${nameHtml}</div>
        ${meta.description ? `<div class="station-meta__desc">${esc(meta.description)}</div>` : ''}
        ${(genreTags || techTags) ? `<div class="station-meta__tags">${genreTags}${techTags}</div>` : ''}
      </div>`;
    panelEl.classList.add('is-visible');
  }

  async function load(url) {
    const meta = await fetchMeta(url);
    renderPanel(meta);
    return meta;
  }

  function clear() {
    if (!panelEl) return;
    panelEl.innerHTML = '';
    panelEl.classList.remove('is-visible');
  }

  return { fetchMeta, renderPanel, load, clear, esc };
})();

/* =========================================================
   STREAM PLAYER
========================================================= */
const StreamPlayer = (() => {
  const audio = document.getElementById('audio');
  let audioCtx = null, analyser = null, sourceNode = null;

  function ensureAudioGraph() {
    if (audioCtx || !audio) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    analyser.smoothingTimeConstant = 0.8;
    sourceNode = audioCtx.createMediaElementSource(audio);
    sourceNode.connect(analyser);
    analyser.connect(audioCtx.destination);
  }

  function _load(url, withCors) {
    if (!audio) return Promise.reject(new Error('No audio element'));
    ensureAudioGraph();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (withCors) audio.crossOrigin = 'anonymous';
    else audio.removeAttribute('crossOrigin');
    audio.src = url;
    audio.load();
    return audio.play();
  }

  function stop() {
    if (!audio) return;
    audio.pause();
    audio.src = '';
    audio.removeAttribute('crossOrigin');
    if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
  }

  function play(url, onCorsFailure) {
    return _load(url, true).catch(err => {
      console.warn('CORS play failed:', err);
      if (typeof onCorsFailure === 'function') onCorsFailure();
      return _load(url, false);
    });
  }

  function getAnalyser()     { return analyser; }
  function getAudioContext() { return audioCtx; }
  function getSourceNode()   { return sourceNode; }

  return { play, stop, getAnalyser, getAudioContext, getSourceNode };
})();

/* =========================================================
   VISUALIZER
========================================================= */
const Visualizer = (() => {
  const vuEl = document.getElementById('vu-meter');
  const BAR_COUNT = 16;
  const bars = [];
  let rafId = null, analyser = null, dataArray = null, mode = 'idle';

  if (vuEl) {
    for (let i = 0; i < BAR_COUNT; i++) {
      const b = document.createElement('div');
      b.className = 'vu-meter__bar';
      vuEl.appendChild(b);
      bars.push(b);
    }
  }

  function _colorFromCSS(prop) {
    return getComputedStyle(document.documentElement).getPropertyValue(prop).trim();
  }

  function _barColor(norm) {
    if (norm < 0.6)  return _colorFromCSS('--color-vu-low') || '#1aff6a';
    if (norm < 0.85) return _colorFromCSS('--color-vu-mid') || '#e8ff00';
    return _colorFromCSS('--color-vu-high') || '#ff3c00';
  }

  function _renderAnalyser() {
    if (!analyser || !dataArray || !vuEl) return;
    analyser.getByteFrequencyData(dataArray);
    const innerH = vuEl.clientHeight - 16;
    bars.forEach((b, i) => {
      const norm = dataArray[Math.floor((i / BAR_COUNT) * dataArray.length)] / 255;
      b.style.height     = Math.max(2, Math.round(norm * innerH)) + 'px';
      b.style.background = _barColor(norm);
    });
  }

  function _renderFallback(ts) {
    if (!vuEl) return;
    const innerH = vuEl.clientHeight - 16;
    const t = ts / 1000;
    const low = _colorFromCSS('--color-vu-low') || '#1aff6a';
    bars.forEach((b, i) => {
      const phase = (i / BAR_COUNT) * Math.PI * 2;
      const norm  = 0.08 + 0.12 * (0.5 + 0.5 * Math.sin(t * (0.6 + (i % 5) * 0.07) + phase));
      b.style.height     = Math.max(2, Math.round(norm * innerH)) + 'px';
      b.style.background = low + '66';
    });
  }

  function _loop(ts) {
    rafId = requestAnimationFrame(_loop);
    if (mode === 'analyser') _renderAnalyser();
    else if (mode === 'fallback') _renderFallback(ts);
  }

  function isAnalyserSilent() {
    if (!analyser || !dataArray) return true;
    analyser.getByteFrequencyData(dataArray);
    return dataArray.every(v => v === 0);
  }

  function start(analyserNode) {
    analyser  = analyserNode;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    mode = 'analyser';
    if (!rafId) rafId = requestAnimationFrame(_loop);
  }

  function switchToFallback() {
    mode = 'fallback';
    if (!rafId) rafId = requestAnimationFrame(_loop);
  }

  function stop() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    mode = 'idle';
    const idleColor = _colorFromCSS('--color-vu-idle') || '#555';
    bars.forEach(b => { b.style.height = '2px'; b.style.background = idleColor; });
  }

  return { start, stop, switchToFallback, isAnalyserSilent };
})();

/* =========================================================
   RECORDER
========================================================= */
const Recorder = (() => {
  const btnRecord = document.getElementById('btn-record');
  let processor = null, recording = false, buffers = [], sampleRate = 44100;
  let timerInterval = null, startTime = 0;

  const label = btnRecord && btnRecord.querySelector('.btn--record__label');
  const timer = btnRecord && btnRecord.querySelector('.btn--record__timer');

  function _updateTimer() {
    if (!timer) return;
    const e = Math.floor((Date.now() - startTime) / 1000);
    timer.textContent = `${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
  }

  function start(ctx, srcNode) {
    if (recording || !ctx || !srcNode) return;
    recording = true; buffers = []; sampleRate = ctx.sampleRate;
    processor = ctx.createScriptProcessor(4096, 2, 2);
    processor.onaudioprocess = e => {
      if (!recording) return;
      const L = e.inputBuffer.getChannelData(0), R = e.inputBuffer.getChannelData(1);
      const il = new Float32Array(L.length * 2);
      for (let i = 0; i < L.length; i++) { il[i*2] = L[i]; il[i*2+1] = R[i]; }
      buffers.push(il);
    };
    srcNode.connect(processor);
    processor.connect(ctx.destination);
    if (btnRecord) btnRecord.classList.add('is-recording');
    if (label) label.textContent = 'Stop Rec';
    startTime = Date.now(); _updateTimer();
    timerInterval = setInterval(_updateTimer, 1000);
  }

  function stop() {
    if (!recording) return;
    recording = false;
    clearInterval(timerInterval);
    if (timer) timer.textContent = '';
    if (btnRecord) btnRecord.classList.remove('is-recording');
    if (label) label.textContent = 'Record';
    if (processor) { try { processor.disconnect(); } catch (_) {} processor.onaudioprocess = null; processor = null; }
    if (!buffers.length) return;
    const totalLen = buffers.reduce((s, b) => s + b.length, 0);
    const merged = new Float32Array(totalLen);
    let off = 0;
    buffers.forEach(c => { merged.set(c, off); off += c.length; });
    buffers = [];
    _downloadWav(merged, 2, sampleRate);
  }

  function _downloadWav(samples, ch, rate) {
    const bps = 2, ba = ch*bps, br = rate*ba, dl = samples.length*bps;
    const buf = new ArrayBuffer(44+dl), view = new DataView(buf);
    const ws = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o+i, s.charCodeAt(i)); };
    ws(0,'RIFF'); view.setUint32(4,36+dl,true); ws(8,'WAVE'); ws(12,'fmt ');
    view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,ch,true);
    view.setUint32(24,rate,true); view.setUint32(28,br,true); view.setUint16(32,ba,true);
    view.setUint16(34,16,true); ws(36,'data'); view.setUint32(40,dl,true);
    let p = 44;
    for (let i = 0; i < samples.length; i++, p+=2) {
      const s = Math.max(-1, Math.min(1, samples[i]));
      view.setInt16(p, s < 0 ? s*0x8000 : s*0x7FFF, true);
    }
    const nameEl = document.querySelector('.station-meta__name');
    const base = nameEl ? nameEl.textContent.trim().replace(/[^a-z0-9]/gi,'_').toLowerCase() : 'recording';
    const ts   = new Date().toISOString().slice(0,19).replace(/[T:]/g,'-');
    const blob = new Blob([buf], { type: 'audio/wav' });
    const url  = URL.createObjectURL(blob);
    const a = Object.assign(document.createElement('a'), { href: url, download: `${base}_${ts}.wav` });
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  }

  function isRecording() { return recording; }
  return { start, stop, isRecording };
})();

/* =========================================================
   THEME SWITCHER UI
========================================================= */
const ThemeUI = (() => {
  const header    = document.getElementById('theme-header');
  const body      = document.getElementById('theme-body');
  const toggle    = document.getElementById('theme-toggle');
  const grid      = document.getElementById('theme-grid');
  const uploadBtn = document.getElementById('theme-upload');
  const downloadB = document.getElementById('theme-download-btn');

  function render() {
    if (!grid) return;
    const themes   = ThemeEngine.getAll();
    const activeId = ThemeEngine.getActive();
    grid.innerHTML = '';
    themes.forEach(t => {
      const card = document.createElement('div');
      card.className = 'theme-card' + (t.id === activeId ? ' is-active' : '');
      card.setAttribute('role', 'option');
      card.setAttribute('aria-selected', t.id === activeId ? 'true' : 'false');
      card.tabIndex = 0;
      const swatchColors = [
        t.vars['color-bg'] || '#000',
        t.vars['color-accent'] || '#fff',
        t.vars['color-accent2'] || '#f00',
      ];
      const swatchHtml = swatchColors.map(c =>
        `<span class="theme-card__swatch" style="background:${c}"></span>`).join('');
      card.innerHTML = `
        <div class="theme-card__swatches">${swatchHtml}</div>
        <div class="theme-card__name">${t.name}</div>
        ${t.label ? `<div class="theme-card__label">${t.label}</div>` : ''}`;
      const activate = () => {
        ThemeEngine.apply(t.id);
        render();
        Toast.show(`Skin: ${t.name}`);
      };
      card.addEventListener('click', activate);
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); } });
      grid.appendChild(card);
    });
  }

  if (header) {
    const open = () => {
      if (body)   body.classList.toggle('is-open');
      if (toggle) toggle.classList.toggle('is-open');
    };
    header.addEventListener('click', open);
    header.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });
  }

  if (uploadBtn) {
    uploadBtn.addEventListener('change', async e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const raw = JSON.parse(text);
        /* Strip _INSTRUCTIONS, _comment__ keys, _customCSS_note before import */
        const cleaned = { ...raw, vars: {}, customCSS: raw.customCSS || '' };
        delete cleaned._INSTRUCTIONS;
        delete cleaned._customCSS_note;
        Object.entries(raw.vars || {}).forEach(([k, v]) => {
          if (!k.startsWith('_')) cleaned.vars[k] = v;
        });
        ThemeEngine.addCustomTheme(cleaned);
        ThemeEngine.apply(cleaned.id);
        render();
        Toast.show(`Skin "${cleaned.name}" loaded!`);
      } catch (err) {
        Toast.show('Invalid skin file: ' + err.message, true);
      }
      uploadBtn.value = '';
    });
  }

  if (downloadB) {
    downloadB.addEventListener('click', () => {
      const json = ThemeEngine.exportCurrentTheme();
      const active = ThemeEngine.getAll().find(t => t.id === ThemeEngine.getActive()) || ThemeEngine.getAll()[0];
      const blob = new Blob([json], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a = Object.assign(document.createElement('a'), {
        href: url, download: `radio-skin-${active.id}.json`
      });
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
      Toast.show('Skin downloaded!');
    });
  }

  return { render };
})();

/* =========================================================
   PLAYBACK CONTROLLER
========================================================= */
const Player = (() => {
  const audio      = document.getElementById('audio');
  const btnPlay    = document.getElementById('btn-play');
  const btnStop    = document.getElementById('btn-stop');
  const btnRecord  = document.getElementById('btn-record');
  const urlDisplay = document.getElementById('stream-url-display');
  const corsNotice = document.getElementById('cors-notice');

  let currentUrl   = null;
  let corsCheckTimer = null;

  const params     = new URLSearchParams(window.location.search);
  const initialUrl = params.get('play') || 'https://dancewave.online/dance.ogg';

  function _updateBrowserUrl(url) {
    const u = new URL(window.location.href);
    if (url) u.searchParams.set('play', url);
    else u.searchParams.delete('play');
    window.history.replaceState({}, '', u.toString());
  }

  function _scheduleCorsCheck() {
    clearTimeout(corsCheckTimer);
    corsCheckTimer = setTimeout(() => {
      if (Visualizer.isAnalyserSilent()) {
        Visualizer.switchToFallback();
        if (corsNotice) corsNotice.style.display = 'block';
      }
    }, 2500);
  }

  function play(url) {
    url = url || currentUrl || initialUrl;
    currentUrl = url;
    _updateBrowserUrl(url);
    FavoritesUI.setActive(url);

    if (urlDisplay) {
      urlDisplay.innerHTML = `<span class="stream-url__label">SRC</span> ${url}`;
      urlDisplay.title = url;
    }

    if (btnPlay)   btnPlay.disabled   = true;
    if (btnStop)   btnStop.disabled   = false;
    if (corsNotice) corsNotice.style.display = 'none';
    StatusBar.set('buffering');
    IcyMeta.load(url);

    StreamPlayer.play(url, () => {
      Visualizer.switchToFallback();
      if (corsNotice) corsNotice.style.display = 'block';
    }).catch(() => {
      StatusBar.set('error');
      Visualizer.stop();
      if (btnPlay) btnPlay.disabled = false;
      if (btnStop) btnStop.disabled = true;
    });
  }

  function stop() {
    clearTimeout(corsCheckTimer);
    if (Recorder.isRecording()) Recorder.stop();
    StreamPlayer.stop();
    Visualizer.stop();
    IcyMeta.clear();
    if (btnPlay)   btnPlay.disabled   = false;
    if (btnStop)   btnStop.disabled   = true;
    if (btnRecord) btnRecord.disabled = true;
    StatusBar.set('idle');
    FavoritesUI.setActive(null);
  }

  if (btnPlay)   btnPlay.addEventListener('click',  () => play());
  if (btnStop)   btnStop.addEventListener('click',  stop);
  if (btnRecord) btnRecord.addEventListener('click', () => {
    if (Recorder.isRecording()) Recorder.stop();
    else {
      const ctx = StreamPlayer.getAudioContext();
      const tap = StreamPlayer.getSourceNode();
      if (ctx && tap) Recorder.start(ctx, tap);
    }
  });

  if (audio) {
    audio.addEventListener('playing', () => {
      StatusBar.set('playing');
      Visualizer.start(StreamPlayer.getAnalyser());
      _scheduleCorsCheck();
      if (btnRecord) btnRecord.disabled = false;
    });
    audio.addEventListener('waiting', () => StatusBar.set('buffering'));
    audio.addEventListener('stalled', () => StatusBar.set('buffering'));
    audio.addEventListener('ended',   stop);
    audio.addEventListener('error',   () => {
      StatusBar.set('error');
      Visualizer.stop();
      if (Recorder.isRecording()) Recorder.stop();
      if (btnPlay)   btnPlay.disabled   = false;
      if (btnStop)   btnStop.disabled   = true;
      if (btnRecord) btnRecord.disabled = true;
    });
  }

  /* Volume */
  const volSlider = document.getElementById('vol-slider');
  const volValue  = document.getElementById('vol-value');
  const volIcon   = document.getElementById('vol-icon');

  function _updateVolUI(val) {
    const pct = Math.round(val * 100);
    if (volValue) volValue.textContent = `${pct}%`;
    if (volSlider) volSlider.style.background =
      `linear-gradient(to right, var(--slider-thumb-color) ${pct}%, var(--slider-track-bg) ${pct}%)`;
    if (!volIcon) return;
    if (val === 0)       volIcon.textContent = '🔇';
    else if (val < 0.4)  volIcon.textContent = '🔈';
    else if (val < 0.75) volIcon.textContent = '🔉';
    else                 volIcon.textContent = '🔊';
  }

  if (volSlider && audio) {
    volSlider.addEventListener('input', () => {
      audio.volume = volSlider.value / 100;
      _updateVolUI(audio.volume);
    });
  }

  let lastVolume = 1;
  if (volIcon && audio) {
    volIcon.addEventListener('click', () => {
      if (audio.volume > 0) { lastVolume = audio.volume; audio.volume = 0; if (volSlider) volSlider.value = 0; }
      else { audio.volume = lastVolume; if (volSlider) volSlider.value = Math.round(lastVolume * 100); }
      _updateVolUI(audio.volume);
    });
    volIcon.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); volIcon.click(); }
    });
  }

  _updateVolUI(1);

  return { play, stop, getInitialUrl: () => initialUrl };
})();

/* =========================================================
   FAVORITES UI
========================================================= */
const FavoritesUI = (() => {
  const listEl  = document.getElementById('station-list');
  const countEl = document.getElementById('fav-count');
  const inputEl = document.getElementById('fav-input');
  const addBtn  = document.getElementById('fav-add-btn');
  const header  = document.getElementById('fav-header');
  const body    = document.getElementById('fav-body');
  const toggle  = document.getElementById('fav-toggle');

  let activeUrl = null;

  if (header) {
    const open = () => {
      if (body)   body.classList.toggle('is-open');
      if (toggle) toggle.classList.toggle('is-open');
    };
    header.addEventListener('click', open);
    header.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });
  }

  function _urlToLabel(url) {
    try { const u = new URL(url); return u.hostname + (u.pathname !== '/' ? u.pathname : ''); }
    catch { return url; }
  }

  function _renderItem(fav) {
    const li = document.createElement('div');
    li.className = 'station-list__item' + (fav.url === activeUrl ? ' is-active' : '');
    li.dataset.url = fav.url;
    li.setAttribute('role', 'listitem');

    const meta = fav.meta;
    const displayName = meta?.name || _urlToLabel(fav.url);
    const genreTags = meta?.genre
      ? meta.genre.split(/[\s/]+/).filter(Boolean).slice(0,3)
          .map(g => `<span class="station-list__tag">${IcyMeta.esc(g)}</span>`).join('')
      : '';
    const techTags = meta?.bitrate
      ? `<span class="station-list__tag station-list__tag--hl">${IcyMeta.esc(meta.bitrate)} kbps</span>` : '';
    const tagsHtml = (genreTags || techTags) ? `<div class="station-list__tags">${genreTags}${techTags}</div>` : '';

    let logoHtml;
    if (meta === null) {
      logoHtml = `<div class="station-list__logo-wrap"><div class="station-list__logo-loading"></div></div>`;
    } else if (meta?.logo) {
      logoHtml = `<div class="station-list__logo-wrap"><img class="station-list__logo" src="${IcyMeta.esc(meta.logo)}" alt="" onerror="this.outerHTML='<span class=station-list__logo-placeholder>📻</span>'"></div>`;
    } else {
      logoHtml = `<div class="station-list__logo-wrap"><span class="station-list__logo-placeholder">📻</span></div>`;
    }

    li.innerHTML = `
      ${logoHtml}
      <div class="station-list__info">
        <div class="station-list__name">${IcyMeta.esc(displayName)}</div>
        <div class="station-list__url">${IcyMeta.esc(fav.url)}</div>
        ${tagsHtml}
      </div>
      <div class="station-list__actions">
        <button class="station-list__btn station-list__btn--play" title="Play this station">▶</button>
        <button class="station-list__btn station-list__btn--remove" title="Remove from favorites">✕</button>
      </div>`;

    const playStation = () => Player.play(fav.url);
    li.querySelector('.station-list__info').addEventListener('click', playStation);
    li.querySelector('.station-list__btn--play').addEventListener('click', playStation);
    li.querySelector('.station-list__btn--remove').addEventListener('click', e => {
      e.stopPropagation();
      FavoritesStore.remove(fav.url);
      render();
      Toast.show('Station removed');
    });

    return li;
  }

  function render() {
    const favs = FavoritesStore.getAll();
    if (countEl) countEl.textContent = favs.length;
    if (!listEl) return;
    if (!favs.length) {
      listEl.innerHTML = `<div class="station-list__empty">No favorites yet.<br>Paste a stream URL above and press <code>+ Add</code>.</div>`;
      return;
    }
    listEl.innerHTML = '';
    favs.forEach(fav => listEl.appendChild(_renderItem(fav)));
  }

  function setActive(url) {
    activeUrl = url;
    if (!listEl) return;
    listEl.querySelectorAll('.station-list__item').forEach(el => {
      el.classList.toggle('is-active', el.dataset.url === url);
    });
  }

  async function _addStation(url) {
    url = (url || '').trim();
    if (!url) { Toast.show('Enter a stream URL', true); return; }
    try { new URL(url); } catch { Toast.show('Invalid URL', true); return; }
    if (!FavoritesStore.add(url)) { Toast.show('Already in favorites', true); return; }
    render();
    Toast.show('Station added — fetching metadata…');
    if (inputEl) inputEl.value = '';
    const meta = await IcyMeta.fetchMeta(url);
    FavoritesStore.updateMeta(url, meta || undefined);
    render();
  }

  if (addBtn) addBtn.addEventListener('click', () => _addStation(inputEl ? inputEl.value : ''));
  if (inputEl) inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') _addStation(inputEl.value); });

  async function hydrateAll() {
    for (const fav of FavoritesStore.getAll()) {
      if (fav.meta === null) {
        const meta = await IcyMeta.fetchMeta(fav.url);
        FavoritesStore.updateMeta(fav.url, meta || undefined);
        render();
      }
    }
  }

  return { render, setActive, hydrateAll };
})();

/* =========================================================
   BOOTSTRAP
========================================================= */
(function init() {
  ThemeEngine.init();
  ThemeUI.render();
  FavoritesUI.render();
  FavoritesUI.hydrateAll();

  const initialUrl = Player.getInitialUrl();
  const urlDisplay = document.getElementById('stream-url-display');
  if (urlDisplay) urlDisplay.innerHTML = `<span class="stream-url__label">SRC</span> ${initialUrl}`;
  Player.play(initialUrl);
})();
</script>
