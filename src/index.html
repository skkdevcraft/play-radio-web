<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Stream Player</title>
  <link href="style.css" rel="stylesheet" />
</head>

<body>
  <div class="bg-layer-1"></div>
  <div class="bg-layer-2"></div>
  <div class="bg-layer-3"></div>

  <main id="app">
    <header class="site-header">
      <h1 class="site-header__title">radiocombinator.com</h1>
      <p class="site-header__subtitle">Stream Player</p>
    </header>

    <article class="player" aria-label="Stream player">
      <section class="station-meta" id="station-meta" aria-label="Station info" aria-live="polite"></section>
      <figure class="vu-meter" id="vu-meter" aria-hidden="true"></figure>
      <div class="status-bar" role="status" aria-live="polite">
        <span class="status-bar__dot" id="status-dot" aria-hidden="true"></span>
        <span class="status-bar__text" id="status-text">Idle</span>
      </div>
      <div class="stream-url" id="stream-url-display" aria-label="Stream source">
        <span class="stream-url__label">SRC</span> —
      </div>
      <div class="controls" role="group" aria-label="Playback controls">
        <button class="btn btn--play" id="btn-play" aria-label="Play stream">▶ Play</button>
        <button class="btn btn--stop" id="btn-stop" aria-label="Stop stream" disabled>■ Stop</button>
        <button class="btn btn--record" id="btn-record" aria-label="Record stream" disabled>
          <span class="btn--record__dot" aria-hidden="true"></span>
          <span class="btn--record__label">Record</span>
          <span class="btn--record__timer"></span>
        </button>
      </div>
      <div class="volume-control">
        <span class="volume-control__icon" id="vol-icon" role="button" tabindex="0" aria-label="Toggle mute">🔊</span>
        <input class="volume-control__slider" id="vol-slider" type="range" min="0" max="100" value="100"
          aria-label="Volume">
        <span class="volume-control__value" id="vol-value">100%</span>
      </div>
      <p class="cors-notice" id="cors-notice" role="alert">
        ⚠ Visualizer limited — stream server does not send CORS headers.
      </p>
    </article>

    <!-- THEME / SKIN SWITCHER -->
    <aside class="theme-switcher" id="theme-switcher" aria-label="Appearance / Skin">
      <div class="theme-switcher__header" id="theme-header" role="button" tabindex="0">
        <span class="theme-switcher__title">Skin</span>
        <span class="theme-switcher__toggle" id="theme-toggle">▼</span>
      </div>
      <div class="theme-switcher__body" id="theme-body">
        <div class="theme-grid" id="theme-grid" role="listbox" aria-label="Available skins"></div>
      </div>
    </aside>

    <!-- FAVORITES -->
    <section class="favorites-panel" id="favorites-panel" aria-label="Favorite stations">
      <div class="favorites-panel__header" id="fav-header" role="button" tabindex="0">
        <div style="display:flex;align-items:center;gap:0.6rem;">
          <span class="favorites-panel__title">Favorites</span>
          <span class="favorites-panel__count" id="fav-count">0</span>
        </div>
        <span class="favorites-panel__toggle is-open" id="fav-toggle">▼</span>
      </div>
      <div class="favorites-panel__body is-open" id="fav-body">
        <div class="add-station">
          <input class="add-station__input" id="fav-input" type="url" placeholder="https://stream.example.com/radio.mp3"
            autocomplete="off" spellcheck="false" aria-label="Stream URL to add" />
          <button class="add-station__btn" id="fav-add-btn">+ Add</button>
        </div>
        <div class="station-list" id="station-list" role="list"></div>
      </div>
    </section>

    <!-- SEARCH -->
    <section class="search-panel" aria-label="Search radio stations">
      <div class="search-panel__header" role="button" tabindex="0">
        <span class="search-panel__title">Search Stations via Radio-Browser.info</span>
      </div>
      <div class="search-panel__body">
        <div class="search-input-area">
          <input class="search-input-area__input" id="search-input" type="text"
            placeholder="Search by name, tag, country..." autocomplete="off" spellcheck="false"
            aria-label="Search query" />
          <button class="search-input-area__btn" id="search-btn">Search</button>
        </div>
        <div class="search-results-list" id="search-results-list" role="list">
          <div class="search-results__empty">Enter a query above to find stations.</div>
        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <a href="https://github.com/skkdevcraft/play-radio-web" class="github-link" aria-label="GitHub repository">
      <svg class="github-icon" viewBox="0 0 24 24" width="40" height="40">
        <path
          d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.03-2.682-.103-.253-.447-1.27.098-2.646 0 0 .84-.269 2.75 1.025.8-.223 1.65-.334 2.5-.334.85 0 1.7.111 2.5.334 1.91-1.294 2.75-1.025 2.75-1.025.545 1.376.201 2.393.099 2.646.64.698 1.03 1.591 1.03 2.682 0 3.841-2.337 4.687-4.565 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z" />
      </svg>
      <!-- <span>GitHub</span> -->
    </a>
  </footer>

  <div class="toast" id="toast" role="status" aria-live="assertive" aria-atomic="true"></div>
  <audio id="audio" preload="none"></audio>

  <script src="main.js" type="module"></script>
</body>

</html>
