<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Stream Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --panel: #111;
      --border: #2a2a2a;
      --accent: #e8ff00;
      --accent2: #ff3c00;
      --text: #e0e0e0;
      --dim: #555;
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Bebas Neue', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px);
    }

    main {
      width: 100%;
      max-width: 520px;
      padding-top: 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 8vw, 4rem);
      letter-spacing: 0.08em;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(232,255,0,0.3), 3px 3px 0 var(--accent2);
      line-height: 1;
    }

    header p {
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    .player {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      padding: 2rem;
      position: relative;
    }

    /* VU meter */
    .vu-meter {
      display: flex;
      gap: 3px;
      height: 60px;
      align-items: flex-end;
      margin-bottom: 1.5rem;
      padding: 0.5rem;
      background: #000;
      border: 1px solid var(--border);
    }

    .vu-bar {
      flex: 1;
      background: var(--dim);
      min-height: 2px;
      transform-origin: bottom;
    }

    /* Status */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.playing { background: #1aff6a; box-shadow: 0 0 8px #1aff6a; animation: blink 1.2s ease-in-out infinite; }
    .status-dot.buffering { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: blink 0.4s ease-in-out infinite; }
    .status-dot.error { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #status-text { color: var(--dim); }

    /* Stream URL display */
    .stream-url {
      font-size: 0.65rem;
      color: var(--dim);
      background: #000;
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      margin-bottom: 1.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.05em;
    }

    .stream-url span { color: var(--accent); }

    /* Controls */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    button {
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: 0.1em;
      padding: 0.8rem 1rem;
      border: 1px solid;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }

    button:active::after { opacity: 0.15; background: #fff; }

    #btn-play { border-color: var(--accent); color: var(--accent); }
    #btn-play:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(232,255,0,0.4); }

    #btn-stop { border-color: var(--accent2); color: var(--accent2); }
    #btn-stop:hover { background: var(--accent2); color: #fff; box-shadow: 0 0 20px rgba(255,60,0,0.4); }

    button:disabled { opacity: 0.3; cursor: not-allowed; }
    button:disabled:hover { background: transparent; box-shadow: none; color: inherit; }

    #btn-record {
      border-color: #c0392b;
      color: #c0392b;
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 1.2rem;
    }

    #btn-record:hover:not(:disabled) { background: #c0392b; color: #fff; box-shadow: 0 0 20px rgba(192,57,43,0.5); }

    #btn-record.recording {
      border-color: var(--accent2);
      color: var(--accent2);
      animation: rec-pulse 1.4s ease-in-out infinite;
    }

    #btn-record.recording:hover:not(:disabled) { background: var(--accent2); color: #fff; box-shadow: 0 0 20px rgba(255,60,0,0.5); }

    @keyframes rec-pulse {
      0%, 100% { box-shadow: 0 0 0px rgba(255,60,0,0); }
      50%       { box-shadow: 0 0 12px rgba(255,60,0,0.7); }
    }

    .rec-dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    #btn-record.recording .rec-dot { animation: blink 0.8s ease-in-out infinite; }
    .rec-timer { font-size: 0.75rem; font-family: var(--font-mono); letter-spacing: 0.1em; opacity: 0.8; }

    /* Volume control */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .volume-icon { font-size: 0.9rem; color: var(--dim); flex-shrink: 0; width: 1.2rem; text-align: center; user-select: none; }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 3px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px rgba(232,255,0,0.4);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .volume-slider::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%; border: none;
      background: var(--accent);
      box-shadow: 0 0 6px rgba(232,255,0,0.4);
      cursor: pointer;
    }

    .volume-slider:hover::-webkit-slider-thumb { transform: scale(1.3); box-shadow: 0 0 12px rgba(232,255,0,0.7); }
    .volume-slider:hover::-moz-range-thumb { transform: scale(1.3); box-shadow: 0 0 12px rgba(232,255,0,0.7); }

    .volume-value { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em; width: 2.5rem; text-align: right; flex-shrink: 0; }

    /* ICY Station metadata panel */
    .station-meta { display: none; margin-bottom: 1.5rem; background: #000; border: 1px solid var(--border); overflow: hidden; }
    .station-meta.visible { display: flex; }

    .station-logo { width: 80px; min-width: 80px; height: 80px; object-fit: cover; display: block; background: #1a1a1a; border-right: 1px solid var(--border); }
    .station-logo-placeholder { width: 80px; min-width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; background: #0d0d0d; border-right: 1px solid var(--border); color: var(--dim); flex-shrink: 0; }

    .station-info { padding: 0.6rem 0.8rem; display: flex; flex-direction: column; justify-content: center; gap: 0.25rem; overflow: hidden; min-width: 0; }
    .station-name { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 0.08em; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.1; }
    .station-name a { color: inherit; text-decoration: none; }
    .station-name a:hover { text-decoration: underline; }
    .station-desc { font-size: 0.62rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.04em; }

    .station-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.15rem; }
    .station-tag { font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; background: #1a1a1a; border: 1px solid var(--border); color: var(--dim); padding: 0.15em 0.45em; }
    .station-tag.hl { border-color: var(--accent); color: var(--accent); }

    /* ============================================================
       FAVORITES PANEL
    ============================================================ */
    .favorites-panel {
      margin-top: 1.5rem;
      border: 1px solid var(--border);
      border-top: 3px solid #333;
    }

    .favorites-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      background: #0d0d0d;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    .favorites-header-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .favorites-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    .favorites-count {
      font-size: 0.6rem;
      color: var(--dim);
      letter-spacing: 0.1em;
      background: #1a1a1a;
      border: 1px solid var(--border);
      padding: 0.1em 0.5em;
    }

    .favorites-toggle {
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.1em;
      transition: transform 0.2s;
    }

    .favorites-toggle.open { transform: rotate(180deg); }

    .favorites-body {
      display: none;
      background: #0a0a0a;
    }

    .favorites-body.open { display: block; }

    /* Add Station form */
    .add-station-form {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
    }

    .add-station-input {
      flex: 1;
      background: #000;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: 0.5rem 0.6rem;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }

    .add-station-input::placeholder { color: #333; }
    .add-station-input:focus { border-color: var(--accent); }

    .add-station-btn {
      font-family: var(--font-display);
      font-size: 1rem;
      letter-spacing: 0.1em;
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      cursor: pointer;
      background: transparent;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .add-station-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 12px rgba(232,255,0,0.3); }

    /* Station list */
    .station-list {
      max-height: 320px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .station-list::-webkit-scrollbar { width: 4px; }
    .station-list::-webkit-scrollbar-track { background: transparent; }
    .station-list::-webkit-scrollbar-thumb { background: var(--border); }

    .fav-item {
      display: flex;
      align-items: center;
      gap: 0;
      border-bottom: 1px solid #161616;
      transition: background 0.1s;
      position: relative;
      overflow: hidden;
    }

    .fav-item:last-child { border-bottom: none; }
    .fav-item:hover { background: #111; }
    .fav-item.active-station { background: #0d1400; }
    .fav-item.active-station::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--accent);
    }

    .fav-logo-wrap {
      width: 52px;
      min-width: 52px;
      height: 52px;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080808;
      overflow: hidden;
      flex-shrink: 0;
    }

    .fav-logo {
      width: 52px;
      height: 52px;
      object-fit: cover;
      display: block;
    }

    .fav-logo-placeholder {
      font-size: 1.2rem;
      color: var(--dim);
    }

    .fav-logo-loading {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .fav-info {
      flex: 1;
      padding: 0.5rem 0.7rem;
      overflow: hidden;
      min-width: 0;
      cursor: pointer;
    }

    .fav-name {
      font-family: var(--font-display);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.1;
    }

    .active-station .fav-name { color: var(--accent); }

    .fav-url {
      font-size: 0.57rem;
      color: var(--dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.2rem;
      letter-spacing: 0.03em;
    }

    .fav-tags {
      display: flex;
      gap: 0.25rem;
      margin-top: 0.3rem;
      flex-wrap: wrap;
    }

    .fav-tag {
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      border: 1px solid #2a2a2a;
      padding: 0.1em 0.35em;
    }

    .fav-tag.hl { color: var(--accent); border-color: rgba(232,255,0,0.3); }

    .fav-actions {
      display: flex;
      align-items: center;
      padding: 0 0.5rem;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .fav-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      padding: 0;
      letter-spacing: 0;
    }

    .fav-btn-play:hover { border-color: var(--accent); color: var(--accent); background: rgba(232,255,0,0.07); }
    .fav-btn-remove:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(255,60,0,0.07); }

    .fav-empty {
      padding: 1.5rem 1rem;
      text-align: center;
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 0.1em;
      line-height: 1.8;
    }

    .fav-empty code {
      color: var(--accent);
      background: #000;
      padding: 0.1em 0.4em;
    }

    /* Notification toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 0.6rem 1.2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-left-color: var(--accent2); }

    footer { margin-top: 1rem; text-align: right; font-size: 0.6rem; color: #333; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Radio</h1>
      <p>Stream Player</p>
    </header>

    <article class="player">
      <div class="station-meta" id="station-meta" aria-label="Station info"></div>

      <div class="vu-meter" id="vu-meter" aria-hidden="true"></div>

      <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Idle</span>
      </div>

      <div class="stream-url" id="stream-url-display">
        <span>SRC</span> —
      </div>

      <div id="player-content"></div>
    </article>

    <!-- FAVORITES PANEL -->
    <div class="favorites-panel" id="favorites-panel">
      <div class="favorites-header" id="fav-header">
        <div class="favorites-header-left">
          <span class="favorites-title">Favorites</span>
          <span class="favorites-count" id="fav-count">0</span>
        </div>
        <span class="favorites-toggle" id="fav-toggle">▼</span>
      </div>
      <div class="favorites-body open" id="fav-body">
        <div class="add-station-form">
          <input class="add-station-input" id="fav-input" type="url"
            placeholder="https://stream.example.com/radio.mp3" autocomplete="off" spellcheck="false" />
          <button class="add-station-btn" id="fav-add-btn">+ Add</button>
        </div>
        <div class="station-list" id="station-list"></div>
      </div>
    </div>

    <footer>FM / AM / DAB / IP</footer>
  </main>

  <div class="toast" id="toast"></div>
  <audio id="audio" preload="none"></audio>

  <script>
    /* =========================================================
       DOM REFS
    ========================================================= */
    const audio       = document.getElementById('audio');
    const vuMeter     = document.getElementById('vu-meter');
    const statusDot   = document.getElementById('status-dot');
    const statusText  = document.getElementById('status-text');
    const urlDisplay  = document.getElementById('stream-url-display');
    const content     = document.getElementById('player-content');
    const stationMeta = document.getElementById('station-meta');

    /* =========================================================
       TOAST
    ========================================================= */
    let toastTimer = null;
    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' error' : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.className = 'toast'; }, 2500);
    }

    /* =========================================================
       STATUS UI
    ========================================================= */
    function setStatus(state, extra) {
      statusDot.className = 'status-dot ' + state;
      const labels = { idle: 'Idle', playing: 'On Air', buffering: 'Buffering…', error: 'Error' };
      statusText.textContent = extra || labels[state] || state;
    }

    /* =========================================================
       FAVORITES STORE
       Uses localStorage for persistent storage.
    ========================================================= */
    const FavoritesStore = (() => {
      const KEY = 'radio_favorites_v1';

      function load() {
        try { return JSON.parse(localStorage.getItem(KEY)) || []; }
        catch { return []; }
      }

      function save(list) {
        localStorage.setItem(KEY, JSON.stringify(list));
      }

      function getAll() { return load(); }

      function add(url) {
        const list = load();
        if (list.find(f => f.url === url)) return false;
        list.push({ url, meta: null, addedAt: Date.now() });
        save(list);
        return true;
      }

      function remove(url) {
        const list = load().filter(f => f.url !== url);
        save(list);
      }

      function updateMeta(url, meta) {
        const list = load();
        const item = list.find(f => f.url === url);
        if (item) { item.meta = meta; save(list); }
      }

      return { getAll, add, remove, updateMeta };
    })();

    /* =========================================================
       ICY METADATA MODULE
    ========================================================= */
    const IcyMeta = (() => {
      async function fetchMeta(url) {
        try {
          const ctrl = new AbortController();
          const tid = setTimeout(() => ctrl.abort(), 6000);

          const res = await window.fetch(url, {
            method: 'GET',
            redirect: 'follow',   // explicitly follow redirects
            // No Icy-MetaData header — some streams stall or behave badly when they see it
            signal: ctrl.signal,
          });

          clearTimeout(tid);

          // Cancel body download immediately — we only want response headers
          if (res.body) {
            try { await res.body.cancel(); } catch (_) {}
          }

          const h = res.headers;

          // ICY headers are lowercase in the Fetch API; check both casings defensively
          const get = key => h.get(key) || h.get(key.toLowerCase()) || null;

          const meta = {
            name:        get('icy-name'),
            description: get('icy-description'),
            genre:       get('icy-genre'),
            url:         get('icy-url'),
            logo:        get('icy-logo'),
            bitrate:     get('icy-br'),
            samplerate:  get('icy-sr'),
          };

          if (Object.values(meta).some(v => v !== null)) return meta;
          return null;
        } catch (e) {
          // CORS block, network error, timeout, etc — fail silently
          return null;
        }
      }

      function esc(str) {
        return String(str)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;')
          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      function renderPanel(meta, panelEl) {
        if (!meta) return;
        const nameHtml = meta.url
          ? `<a href="${esc(meta.url)}" target="_blank" rel="noopener">${esc(meta.name || 'Unknown Station')}</a>`
          : esc(meta.name || 'Unknown Station');

        const genreTags = meta.genre
          ? meta.genre.split(/[\s/]+/).filter(Boolean).map(g =>
              `<span class="station-tag">${esc(g)}</span>`).join('')
          : '';

        const techTags = [
          meta.bitrate    ? `<span class="station-tag hl">${esc(meta.bitrate)} kbps</span>` : '',
          meta.samplerate ? `<span class="station-tag">${esc(meta.samplerate)} Hz</span>` : '',
        ].join('');

        const logoHtml = meta.logo
          ? `<img class="station-logo" src="${esc(meta.logo)}" alt="Station logo" onerror="this.outerHTML='<div class=station-logo-placeholder>📻</div>'">`
          : `<div class="station-logo-placeholder">📻</div>`;

        panelEl.innerHTML = `
          ${logoHtml}
          <div class="station-info">
            <div class="station-name">${nameHtml}</div>
            ${meta.description ? `<div class="station-desc">${esc(meta.description)}</div>` : ''}
            ${(genreTags || techTags) ? `<div class="station-tags">${genreTags}${techTags}</div>` : ''}
          </div>`;
        panelEl.classList.add('visible');
      }

      async function load(url) {
        const meta = await fetchMeta(url);
        renderPanel(meta, stationMeta);
        return meta;
      }

      function clear() {
        stationMeta.innerHTML = '';
        stationMeta.classList.remove('visible');
      }

      return { fetchMeta, renderPanel, load, clear, esc };
    })();

    /* =========================================================
       STREAM MODULE
    ========================================================= */
    const StreamPlayer = (() => {
      let audioCtx   = null;
      let analyser   = null;
      let sourceNode = null;
      let corsMode   = true;

      function ensureAudioGraph() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 64;
        analyser.smoothingTimeConstant = 0.8;
        sourceNode = audioCtx.createMediaElementSource(audio);
        sourceNode.connect(analyser);
        analyser.connect(audioCtx.destination);
      }

      function loadAndPlay(url, withCors) {
        ensureAudioGraph();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (withCors) { audio.crossOrigin = 'anonymous'; }
        else { audio.removeAttribute('crossOrigin'); }
        audio.src = url;
        audio.load();
        return audio.play();
      }

      function stop() {
        audio.pause();
        audio.src = '';
        audio.removeAttribute('crossOrigin');
        if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
      }

      function play(url, onCorsFailure) {
        corsMode = true;
        return loadAndPlay(url, true).catch(err => {
          console.warn('CORS play failed:', err);
          corsMode = false;
          onCorsFailure();
          return loadAndPlay(url, false);
        });
      }

      function getAnalyser()     { return analyser; }
      function getAudioContext() { return audioCtx; }

      return { play, stop, getAnalyser, getAudioContext };
    })();

    /* =========================================================
       VISUALIZER MODULE
    ========================================================= */
    const Visualizer = (() => {
      const BAR_COUNT = 16;
      const bars = [];
      let rafId = null, analyser = null, dataArray = null;
      let mode = 'idle';

      for (let i = 0; i < BAR_COUNT; i++) {
        const b = document.createElement('div');
        b.className = 'vu-bar';
        b.style.height = '2px';
        vuMeter.appendChild(b);
        bars.push(b);
      }

      function barColor(norm) {
        if (norm < 0.6) return '#1aff6a';
        if (norm < 0.85) return '#e8ff00';
        return '#ff3c00';
      }

      function renderAnalyserFrame() {
        analyser.getByteFrequencyData(dataArray);
        const innerH = vuMeter.clientHeight - 16;
        for (let i = 0; i < BAR_COUNT; i++) {
          const norm = dataArray[Math.floor((i / BAR_COUNT) * dataArray.length)] / 255;
          const px = Math.max(2, Math.round(norm * innerH));
          bars[i].style.height = px + 'px';
          bars[i].style.background = barColor(norm);
        }
      }

      function renderFallbackFrame(ts) {
        const innerH = vuMeter.clientHeight - 16;
        const t = ts / 1000;
        for (let i = 0; i < BAR_COUNT; i++) {
          const phase = (i / BAR_COUNT) * Math.PI * 2;
          const norm  = 0.08 + 0.12 * (0.5 + 0.5 * Math.sin(t * (0.6 + (i % 5) * 0.07) + phase));
          bars[i].style.height     = Math.max(2, Math.round(norm * innerH)) + 'px';
          bars[i].style.background = '#1aff6a44';
        }
      }

      function loop(ts) {
        rafId = requestAnimationFrame(loop);
        if (mode === 'analyser') renderAnalyserFrame();
        else if (mode === 'fallback') renderFallbackFrame(ts);
      }

      function isAnalyserSilent() {
        if (!analyser || !dataArray) return true;
        analyser.getByteFrequencyData(dataArray);
        return dataArray.every(v => v === 0);
      }

      function start(analyserNode) {
        analyser  = analyserNode;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        mode = 'analyser';
        if (!rafId) rafId = requestAnimationFrame(loop);
      }

      function switchToFallback() {
        mode = 'fallback';
        if (!rafId) rafId = requestAnimationFrame(loop);
      }

      function stop() {
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        mode = 'idle';
        bars.forEach(b => { b.style.height = '2px'; b.style.background = 'var(--dim)'; });
      }

      return { start, stop, switchToFallback, isAnalyserSilent };
    })();

    /* =========================================================
       CURRENT STREAM STATE
    ========================================================= */
    let currentStreamUrl = null;

    function updateBrowserUrl(streamUrl) {
      const u = new URL(window.location.href);
      if (streamUrl) u.searchParams.set('play', streamUrl);
      else u.searchParams.delete('play');
      window.history.replaceState({}, '', u.toString());
    }

    /* =========================================================
       PLAYER SETUP
    ========================================================= */
    const params    = new URLSearchParams(window.location.search);
    const initialUrl = params.get('play') || 'https://dancewave.online/dance.ogg';

    // Inject player controls
    content.innerHTML = `
      <div class="controls">
        <button id="btn-play" aria-label="Play stream">▶ Play</button>
        <button id="btn-stop" aria-label="Stop stream" disabled>■ Stop</button>
        <button id="btn-record" aria-label="Record stream" disabled>
          <span class="rec-dot"></span>
          <span class="rec-label">Record</span>
          <span class="rec-timer"></span>
        </button>
      </div>
      <div class="volume-row">
        <span class="volume-icon" id="vol-icon">🔊</span>
        <input class="volume-slider" id="vol-slider" type="range" min="0" max="100" value="100" aria-label="Volume">
        <span class="volume-value" id="vol-value">100%</span>
      </div>
      <div id="cors-notice" style="display:none; margin-top:0.8rem; font-size:0.62rem; color:#555; letter-spacing:0.08em; line-height:1.6;">
        ⚠ Visualizer limited — stream server does not send CORS headers.
      </div>`;

    const btnPlay    = document.getElementById('btn-play');
    const btnStop    = document.getElementById('btn-stop');
    const btnRecord  = document.getElementById('btn-record');
    const corsNotice = document.getElementById('cors-notice');

    /* Volume */
    const volSlider = document.getElementById('vol-slider');
    const volValue  = document.getElementById('vol-value');
    const volIcon   = document.getElementById('vol-icon');

    function updateVolumeUI(val) {
      const pct = Math.round(val * 100);
      volValue.textContent = `${pct}%`;
      volSlider.style.background = `linear-gradient(to right, var(--accent) ${pct}%, var(--border) ${pct}%)`;
      if (val === 0)       volIcon.textContent = '🔇';
      else if (val < 0.4)  volIcon.textContent = '🔈';
      else if (val < 0.75) volIcon.textContent = '🔉';
      else                 volIcon.textContent = '🔊';
    }

    volSlider.addEventListener('input', () => {
      audio.volume = volSlider.value / 100;
      updateVolumeUI(audio.volume);
    });

    let lastVolume = 1;
    volIcon.style.cursor = 'pointer';
    volIcon.addEventListener('click', () => {
      if (audio.volume > 0) { lastVolume = audio.volume; audio.volume = 0; volSlider.value = 0; }
      else { audio.volume = lastVolume; volSlider.value = Math.round(lastVolume * 100); }
      updateVolumeUI(audio.volume);
    });

    updateVolumeUI(1);

    /* =========================================================
       RECORDER MODULE
    ========================================================= */
    const Recorder = (() => {
      let processor = null, recording = false, buffers = [], sampleRate = 44100;
      let timerInterval = null, startTime = 0;

      const label = btnRecord.querySelector('.rec-label');
      const timer = btnRecord.querySelector('.rec-timer');

      function updateTimer() {
        const e = Math.floor((Date.now() - startTime) / 1000);
        timer.textContent = `${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
      }

      function start(ctx, sourceNode) {
        if (recording) return;
        recording = true; buffers = []; sampleRate = ctx.sampleRate;
        processor = ctx.createScriptProcessor(4096, 2, 2);
        processor.onaudioprocess = (e) => {
          if (!recording) return;
          const L = e.inputBuffer.getChannelData(0), R = e.inputBuffer.getChannelData(1);
          const il = new Float32Array(L.length * 2);
          for (let i = 0; i < L.length; i++) { il[i*2] = L[i]; il[i*2+1] = R[i]; }
          buffers.push(il);
        };
        sourceNode.connect(processor);
        processor.connect(ctx.destination);
        btnRecord.classList.add('recording');
        label.textContent = 'Stop Rec';
        startTime = Date.now(); updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
      }

      function stop() {
        if (!recording) return;
        recording = false;
        clearInterval(timerInterval);
        timer.textContent = '';
        btnRecord.classList.remove('recording');
        label.textContent = 'Record';
        if (processor) { try { processor.disconnect(); } catch(_) {} processor.onaudioprocess = null; processor = null; }
        if (buffers.length === 0) return;
        const totalLen = buffers.reduce((s,b)=>s+b.length,0);
        const merged = new Float32Array(totalLen);
        let off = 0;
        for (const c of buffers) { merged.set(c, off); off += c.length; }
        buffers = [];
        downloadWav(merged, 2, sampleRate);
      }

      function downloadWav(samples, ch, rate) {
        const bps = 2, ba = ch*bps, br = rate*ba, dl = samples.length*bps;
        const buf = new ArrayBuffer(44+dl), view = new DataView(buf);
        const ws = (o,s) => { for(let i=0;i<s.length;i++) view.setUint8(o+i,s.charCodeAt(i)); };
        ws(0,'RIFF'); view.setUint32(4,36+dl,true); ws(8,'WAVE'); ws(12,'fmt ');
        view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,ch,true);
        view.setUint32(24,rate,true); view.setUint32(28,br,true); view.setUint16(32,ba,true);
        view.setUint16(34,16,true); ws(36,'data'); view.setUint32(40,dl,true);
        let p=44;
        for(let i=0;i<samples.length;i++,p+=2) {
          const s=Math.max(-1,Math.min(1,samples[i]));
          view.setInt16(p,s<0?s*0x8000:s*0x7FFF,true);
        }
        const stEl = document.querySelector('.station-name');
        const base = stEl ? stEl.textContent.trim().replace(/[^a-z0-9]/gi,'_').toLowerCase() : 'recording';
        const ts = new Date().toISOString().slice(0,19).replace(/[T:]/g,'-');
        const blob = new Blob([buf],{type:'audio/wav'});
        const url = URL.createObjectURL(blob);
        const a = Object.assign(document.createElement('a'),{href:url,download:`${base}_${ts}.wav`});
        a.click();
        setTimeout(()=>URL.revokeObjectURL(url),10000);
      }

      function isRecording() { return recording; }
      return { start, stop, isRecording };
    })();

    btnRecord.addEventListener('click', () => {
      if (Recorder.isRecording()) Recorder.stop();
      else { const ctx = StreamPlayer.getAudioContext(), tap = StreamPlayer.getAnalyser(); if(ctx&&tap) Recorder.start(ctx,tap); }
    });

    /* =========================================================
       PLAY / STOP LOGIC
    ========================================================= */
    let corsCheckTimer = null;

    function scheduleCorsCheck() {
      clearTimeout(corsCheckTimer);
      corsCheckTimer = setTimeout(() => {
        if (Visualizer.isAnalyserSilent()) {
          Visualizer.switchToFallback();
          corsNotice.style.display = 'block';
        }
      }, 2500);
    }

    function handlePlay(url) {
      url = url || currentStreamUrl || initialUrl;
      currentStreamUrl = url;
      updateBrowserUrl(url);
      FavoritesUI.setActive(url);

      urlDisplay.innerHTML = `<span>SRC</span> ${url}`;
      urlDisplay.title = url;

      btnPlay.disabled = true;
      btnStop.disabled = false;
      corsNotice.style.display = 'none';
      setStatus('buffering');

      IcyMeta.load(url);

      StreamPlayer.play(url, () => {
        Visualizer.switchToFallback();
        corsNotice.style.display = 'block';
      }).catch(() => {
        setStatus('error');
        Visualizer.stop();
        btnPlay.disabled = false;
        btnStop.disabled = true;
      });
    }

    function handleStop() {
      clearTimeout(corsCheckTimer);
      if (Recorder.isRecording()) Recorder.stop();
      StreamPlayer.stop();
      Visualizer.stop();
      IcyMeta.clear();
      btnPlay.disabled = false;
      btnStop.disabled = true;
      btnRecord.disabled = true;
      setStatus('idle');
      FavoritesUI.setActive(null);
    }

    btnPlay.addEventListener('click', () => handlePlay());
    btnStop.addEventListener('click', handleStop);

    audio.addEventListener('playing', () => {
      setStatus('playing');
      Visualizer.start(StreamPlayer.getAnalyser());
      scheduleCorsCheck();
      btnRecord.disabled = false;
    });

    audio.addEventListener('waiting', () => setStatus('buffering'));
    audio.addEventListener('stalled', () => setStatus('buffering'));
    audio.addEventListener('ended',   handleStop);
    audio.addEventListener('error',   () => {
      setStatus('error');
      Visualizer.stop();
      if (Recorder.isRecording()) Recorder.stop();
      btnPlay.disabled = false;
      btnStop.disabled = true;
      btnRecord.disabled = true;
    });

    /* =========================================================
       FAVORITES UI
    ========================================================= */
    const FavoritesUI = (() => {
      const listEl    = document.getElementById('station-list');
      const countEl   = document.getElementById('fav-count');
      const inputEl   = document.getElementById('fav-input');
      const addBtn    = document.getElementById('fav-add-btn');
      const favHeader = document.getElementById('fav-header');
      const favBody   = document.getElementById('fav-body');
      const favToggle = document.getElementById('fav-toggle');

      let activeUrl = null;

      /* Toggle collapse */
      favHeader.addEventListener('click', () => {
        favBody.classList.toggle('open');
        favToggle.classList.toggle('open');
      });

      function esc(str) { return IcyMeta.esc(str); }

      function urlToLabel(url) {
        try {
          const u = new URL(url);
          return u.hostname + (u.pathname !== '/' ? u.pathname : '');
        } catch { return url; }
      }

      function renderItem(fav) {
        const li = document.createElement('div');
        li.className = 'fav-item' + (fav.url === activeUrl ? ' active-station' : '');
        li.dataset.url = fav.url;

        const meta = fav.meta;
        const displayName = meta?.name || urlToLabel(fav.url);

        const genreTags = meta?.genre
          ? meta.genre.split(/[\s/]+/).filter(Boolean).slice(0, 3)
              .map(g => `<span class="fav-tag">${esc(g)}</span>`).join('')
          : '';
        const techTags = meta?.bitrate
          ? `<span class="fav-tag hl">${esc(meta.bitrate)} kbps</span>`
          : '';
        const tagsHtml = (genreTags || techTags) ? `<div class="fav-tags">${genreTags}${techTags}</div>` : '';

        // Logo area
        let logoHtml;
        if (meta === null) {
          // Not yet fetched — show spinner
          logoHtml = `<div class="fav-logo-wrap"><div class="fav-logo-loading"></div></div>`;
        } else if (meta?.logo) {
          logoHtml = `<div class="fav-logo-wrap"><img class="fav-logo" src="${esc(meta.logo)}" alt="" onerror="this.outerHTML='<span class=fav-logo-placeholder>📻</span>'"></div>`;
        } else {
          logoHtml = `<div class="fav-logo-wrap"><span class="fav-logo-placeholder">📻</span></div>`;
        }

        li.innerHTML = `
          ${logoHtml}
          <div class="fav-info">
            <div class="fav-name">${esc(displayName)}</div>
            <div class="fav-url">${esc(fav.url)}</div>
            ${tagsHtml}
          </div>
          <div class="fav-actions">
            <button class="fav-btn fav-btn-play" title="Play this station">▶</button>
            <button class="fav-btn fav-btn-remove" title="Remove from favorites">✕</button>
          </div>`;

        li.querySelector('.fav-info').addEventListener('click', () => handlePlay(fav.url));
        li.querySelector('.fav-btn-play').addEventListener('click', () => handlePlay(fav.url));
        li.querySelector('.fav-btn-remove').addEventListener('click', () => {
          FavoritesStore.remove(fav.url);
          render();
          showToast('Station removed');
        });

        return li;
      }

      function render() {
        const favs = FavoritesStore.getAll();
        countEl.textContent = favs.length;

        if (favs.length === 0) {
          listEl.innerHTML = `<div class="fav-empty">No favorites yet.<br>Paste a stream URL above and press <code>+ Add</code>.</div>`;
          return;
        }

        listEl.innerHTML = '';
        favs.forEach(fav => listEl.appendChild(renderItem(fav)));
      }

      function setActive(url) {
        activeUrl = url;
        // Update active class without full re-render
        listEl.querySelectorAll('.fav-item').forEach(el => {
          el.classList.toggle('active-station', el.dataset.url === url);
        });
      }

      /* Add a station */
      async function addStation(url) {
        url = url.trim();
        if (!url) { showToast('Enter a stream URL', true); return; }
        try { new URL(url); } catch { showToast('Invalid URL', true); return; }

        const added = FavoritesStore.add(url);
        if (!added) { showToast('Already in favorites', true); return; }

        render();
        showToast('Station added — fetching metadata…');
        inputEl.value = '';

        // Fetch metadata in background and update
        const meta = await IcyMeta.fetchMeta(url);
        FavoritesStore.updateMeta(url, meta || undefined);
        render();
      }

      addBtn.addEventListener('click', () => addStation(inputEl.value));
      inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addStation(inputEl.value); });

      /* Fetch metadata for all stations that don't have it yet */
      async function hydrateAll() {
        const favs = FavoritesStore.getAll();
        for (const fav of favs) {
          if (fav.meta === null) {
            const meta = await IcyMeta.fetchMeta(fav.url);
            FavoritesStore.updateMeta(fav.url, meta || undefined);
            render();
          }
        }
      }

      return { render, setActive, hydrateAll };
    })();

    /* =========================================================
       BOOTSTRAP
    ========================================================= */
    FavoritesUI.render();
    // Hydrate metadata for stored stations in background
    FavoritesUI.hydrateAll();

    // Auto-play initial stream
    currentStreamUrl = initialUrl;
    urlDisplay.innerHTML = `<span>SRC</span> ${initialUrl}`;
    urlDisplay.title = initialUrl;
    handlePlay(initialUrl);

  </script>
</body>
</html>
